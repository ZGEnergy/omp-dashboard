<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Accent rim vs selected-card salience</title>
<style>
  :root { /* real neon vars (dark) */
    --neon-glow-alpha:0.18; --neon-glow-blur:11px; --neon-glow-opacity:0.52;
    --bg:#0a0a0a; --bgT:#1e1e1e; --txt:#e5e5e5; --muted:#585858; --border:rgba(255,255,255,.06);
    --shadowCard:rgba(0,0,0,.4); --rimW:rgba(255,255,255,.10);
    --working:#3b82f6; --needs:#a855f7; --idle:#22c55e; --done:#808080;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; background:var(--bg); color:var(--txt); }
  .head { padding:12px 16px; font-size:13px; color:#999; border-bottom:1px solid #222; }
  .cols { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0; }
  .col { padding:16px; border-right:1px solid #1a1a1a; }
  .col h3 { font-size:12px; font-weight:700; margin:0 0 3px; }
  .col p { font-size:10px; color:var(--muted); margin:0 0 14px; min-height:26px; }

  .folder { background:var(--bgT); border-radius:8px 8px 0 0; padding:8px 10px; display:flex; align-items:center; gap:7px; box-shadow: inset 0 1px 0 var(--rimW), 0 2px 4px var(--shadowCard); }
  .folder.accent { box-shadow: inset 0 1px 0 color-mix(in srgb, var(--working) 50%, var(--rimW)), 0 4px 10px color-mix(in srgb, var(--working) 16%, transparent), 0 2px 4px var(--shadowCard); }
  .folder-title { font-size:13px; font-weight:600; }
  .folder-count { font-size:10px; color:var(--muted); }

  .card { position:relative; isolation:isolate; background:var(--bgT); border:1px solid var(--border); border-radius:11px; box-shadow: inset 0 1px 0 var(--rimW), 0 4px 8px var(--shadowCard); padding:9px 11px; margin-top:8px; display:flex; gap:9px; }
  /* accent rim variants */
  .card.rim-w { box-shadow: inset 0 1px 0 color-mix(in srgb, var(--working) 45%, var(--rimW)), 0 4px 8px var(--shadowCard); }
  .card.rim-n { box-shadow: inset 0 1px 0 color-mix(in srgb, var(--needs) 50%, var(--rimW)), 0 4px 8px var(--shadowCard); }
  .card.rim-i { box-shadow: inset 0 1px 0 color-mix(in srgb, var(--idle) 45%, var(--rimW)), 0 4px 8px var(--shadowCard); }

  .rail { width:6px; border-radius:3px; flex-shrink:0; }
  .rail.w{background:var(--working)} .rail.n{background:var(--needs)} .rail.i{background:var(--idle)} .rail.d{background:var(--done)}
  .session-name { font-size:14px; font-weight:600; }
  .session-meta { font-size:11px; color:var(--muted); margin-top:2px; }

  /* ── Faithful SELECTED card: blue border+ring+tint + rotating rainbow double-glow ── */
  .card.sel { border-color:rgba(59,130,246,.6); background:rgba(59,130,246,.05); box-shadow: 0 0 0 1px rgba(59,130,246,.3), inset 0 1px 0 var(--rimW), 0 4px 8px var(--shadowCard); }
  .card.sel .glow, .card.sel .glow-outer, .card.sel .rim { position:absolute; border-radius:inherit; pointer-events:none; overflow:hidden; container-type:size; }
  .card.sel .glow { inset:-2px; z-index:-2; filter:blur(var(--neon-glow-blur)); opacity:var(--neon-glow-opacity); }
  .card.sel .glow-outer { inset:-7px; z-index:-3; filter:blur(calc(var(--neon-glow-blur)*2)); opacity:calc(var(--neon-glow-opacity)*0.7); }
  .card.sel .glow::before, .card.sel .glow-outer::before, .card.sel .rim::before {
    content:""; position:absolute; left:50%; top:50%; width:200cqmax; height:200cqmax; margin-left:-100cqmax; margin-top:-100cqmax;
    background:conic-gradient(from 0deg, rgb(59 130 246/.18), rgb(139 92 246/.18), rgb(236 72 153/.18), rgb(34 211 238/.18), rgb(59 130 246/.18));
    animation:spin 13s linear infinite; }
  .card.sel .rim { inset:-1px; z-index:-1; padding:1px; -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude; }
  .card.sel .rim::before { background:conic-gradient(from 0deg, rgb(59 130 246/.45), rgb(139 92 246/.45), rgb(236 72 153/.45), rgb(34 211 238/.45), rgb(59 130 246/.45)); }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
  <div class="head">DARK · same 5-card list in each column · <b>which strategy keeps the SELECTED card (working, animated rainbow) clearly on top?</b></div>
  <div class="cols">
    <div class="col" id="A"></div>
    <div class="col" id="B"></div>
    <div class="col" id="C"></div>
  </div>
<script>
  // card: [status, name, meta, selected]
  const list = [
    ["w","refactor-tool-renderer","working · 8.1k · 1m", false],
    ["n","add-title-shadow-tokens","needs you · 2m", false],
    ["w","fix-restart-bridge-race","working · 12.4k · 3m", true],   // SELECTED
    ["i","update-docs-tree","idle · 20m", false],
    ["n","wire-discipline-skills","needs you · 6m", false],
  ];
  const railCls = {w:"w",n:"n",i:"i",d:"d"};
  const rimCls  = {w:"rim-w",n:"rim-n",i:"rim-i"};

  function card([st,name,meta,sel], strategy){
    let cls = "card";
    if (sel) cls += " sel";
    else if (strategy === "all") cls += " " + (rimCls[st]||"");
    else if (strategy === "needs" && st === "n") cls += " rim-n";
    const fx = sel ? `<div class="glow-outer"></div><div class="glow"></div><div class="rim"></div>` : "";
    return `<div class="${cls}">${fx}<div class="rail ${railCls[st]}"></div><div><div class="session-name">${name}</div><div class="session-meta">${meta}</div></div></div>`;
  }
  function col(id, title, note, strategy, folderAccent){
    const el = document.getElementById(id);
    el.innerHTML = `<h3>${title}</h3><p>${note}</p>
      <div class="folder ${folderAccent?'accent':''}"><span style="color:var(--muted)">▸</span><span class="folder-title">pi-agent-dashboard</span><span class="folder-count">5</span></div>`
      + list.map(c=>card(c,strategy)).join("");
  }
  col("A","A · Accent rim on ALL statuses","every card top-edge tinted by status — the confetti risk","all", false);
  col("B","B · Accent rim on NEEDS-YOU only","working/idle neutral; purple rim reserved for attention","needs", false);
  col("C","C · Cards neutral; accent on FOLDER bar only","selection owns all card-level color; depth stays neutral","none", true);
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Depth ladder — how much 3D before it tips</title>
<style>
  .base.dark  { --bg:#0a0a0a; --bgT:#1e1e1e; --txt:#e5e5e5; --muted:#585858; --border:rgba(255,255,255,.06); --blue:#3b82f6; --purple:#a855f7; --shadowCard:rgba(0,0,0,.4); }
  .base.light { --bg:#ffffff; --bgT:#f0f0f0; --txt:#1a1a1a; --muted:#aaa; --border:rgba(0,0,0,.06); --blue:#3b82f6; --purple:#a855f7; --shadowCard:rgba(0,0,0,.08); }

  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; background:#000; color:#ccc; }
  .toolbar { position:sticky; top:0; z-index:10; padding:10px 16px; background:#111; border-bottom:1px solid #333; font-size:13px; color:#888; }
  .toolbar select { background:#1a1a1a; color:#eee; border:1px solid #444; border-radius:6px; padding:4px 8px; }
  .split { display:grid; grid-template-columns:1fr 1fr; }
  .pane { padding:20px; background:var(--bg); color:var(--txt); min-height:100vh; }
  .pane-label { font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin:0 0 14px; }
  .rung { border:1px dashed var(--border); border-radius:12px; padding:2px 12px 12px; margin-bottom:16px; }
  .rung-tag { font-size:10px; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); margin:10px 0 4px; }
  .rung-note { font-size:10px; color:var(--muted); opacity:.8; }

  .folder { background:var(--bgT); border-radius:7px 7px 0 0; padding:7px 10px; display:flex; align-items:center; gap:7px; }
  .folder-title { font-size:13px; font-weight:600; }
  .folder-count { font-size:10px; color:var(--muted); }
  .card { background:var(--bgT); border:1px solid var(--border); border-radius:11px; box-shadow:0 4px 6px var(--shadowCard); padding:9px 11px; margin-top:7px; display:flex; gap:9px; }
  .rail { width:6px; border-radius:3px; background:var(--blue); flex-shrink:0; }
  .session-name { font-size:14px; font-weight:600; }
  .session-meta { font-size:11px; color:var(--muted); margin-top:2px; }

  /* ── DARK glyph/panel recipes ── */
  .dark .r-soft     .folder-title,.dark .r-soft     .session-name { text-shadow:0 1px 2px rgba(0,0,0,.5); }
  .dark .r-engrave  .folder-title,.dark .r-engrave  .session-name { text-shadow:0 -1px 1px rgba(0,0,0,.7), 0 1px 0 rgba(255,255,255,.06); }
  .dark .r-raised   .folder-title,.dark .r-raised   .session-name { text-shadow:0 -1px 0 rgba(255,255,255,.14), 0 2px 4px rgba(0,0,0,.65); }
  .dark .r-extrude  .folder-title,.dark .r-extrude  .session-name { text-shadow:0 1px 0 #000,0 2px 0 #000,0 3px 0 rgba(0,0,0,.8),0 4px 6px rgba(0,0,0,.6); }

  /* ── LIGHT glyph/panel recipes ── */
  .light .r-soft    .folder-title,.light .r-soft    .session-name { text-shadow:0 1px 1px rgba(0,0,0,.06); }
  /* letterpress: white highlight BELOW text on tinted surface → engraved */
  .light .r-engrave .folder-title,.light .r-engrave .session-name { text-shadow:0 1px 0 rgba(255,255,255,.95); }
  .light .r-raised  .folder-title,.light .r-raised  .session-name { text-shadow:0 -1px 0 rgba(255,255,255,.9), 0 1px 2px rgba(0,0,0,.18); }
  .light .r-extrude .folder-title,.light .r-extrude .session-name { text-shadow:0 1px 0 #cfcfcf,0 2px 0 #bfbfbf,0 3px 0 #b0b0b0,0 4px 5px rgba(0,0,0,.25); }

  /* ── Panel bevel (both modes): raise the BAR, text stays crisp ── */
  .r-panel .folder { box-shadow: inset 0 1px 0 rgba(255,255,255,.10), 0 2px 4px var(--shadowCard); }
  .light.r-panel .folder, .r-panel.light .folder { box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 1px 3px rgba(0,0,0,.12); }
  .r-panel .card { box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 5px 10px var(--shadowCard); }
  .light .r-panel .card { box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 4px 8px rgba(0,0,0,.10); }
</style>
</head>
<body>
  <div class="toolbar">
    <label>Theme
      <select id="theme"><option value="base">Base</option></select>
    </label>
    &nbsp;&nbsp; Left = LIGHT · Right = DARK · depth increases top → bottom. Find the rung where it tips from "carved" to "cheesy."
  </div>
  <div class="split">
    <div class="pane light" id="light"></div>
    <div class="pane dark"  id="dark"></div>
  </div>

<script>
  const rungs = [
    ["r-flat",    "0 · Flat (control)",                 "no depth"],
    ["r-soft",    "1 · Soft lift",                       "subtle drop; ~invisible on light"],
    ["r-engrave", "2 · Engraved / letterpress",          "carved INTO the ledge; the light-mode winner"],
    ["r-raised",  "3 · Raised (highlight + shadow)",      "text sits ON TOP of surface"],
    ["r-extrude", "4 · Extruded 3D  ⚠ slop marker",       "game-logo territory — expect cheese"],
    ["r-panel",   "5 · Panel bevel (text crisp)",         "raise the BAR/CARD, not the glyphs"],
  ];
  function block(cls){
    return `<div class="rung ${cls}">
      <div class="rung-tag">${rungs.find(r=>r[0]===cls)[1]}</div>
      <div class="rung-note">${rungs.find(r=>r[0]===cls)[2]}</div>
      <div class="folder"><span style="color:var(--muted)">▸</span><span class="folder-title">pi-agent-dashboard</span><span class="folder-count">6 folders</span></div>
      <div class="card"><div class="rail"></div><div><div class="session-name">add-title-shadow-tokens</div><div class="session-meta">working · 12.4k · 3m</div></div></div>
    </div>`;
  }
  function render(){
    for(const [id,mode] of [["light","light"],["dark","dark"]]){
      const p=document.getElementById(id);
      p.className=`pane ${mode} base`;
      p.innerHTML=`<p class="pane-label">${mode}</p>`+rungs.map(r=>block(r[0])).join("");
    }
  }
  render();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tier 1 — before / after (weight 600 + neutral bevel)</title>
<style>
  .dark  { --bg:#0a0a0a; --bgT:#1e1e1e; --txt:#e5e5e5; --muted:#585858; --border:rgba(255,255,255,.06); --shadowCard:rgba(0,0,0,.4); --rimW:rgba(255,255,255,.10);
           --working:#3b82f6; --needs:#a855f7; --idle:#22c55e; }
  .light { --bg:#ffffff; --bgT:#f0f0f0; --txt:#1a1a1a; --muted:#aaa; --border:rgba(0,0,0,.06); --shadowCard:rgba(0,0,0,.08); --rimW:rgba(255,255,255,.9);
           --working:#3b82f6; --needs:#a855f7; --idle:#22c55e; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; background:#000; }
  .banner { padding:11px 16px; font-size:13px; color:#aaa; background:#111; border-bottom:1px solid #2a2a2a; }
  .banner b { color:#ddd; }
  .grid { display:grid; grid-template-columns:1fr 1fr; }
  .pane { background:var(--bg); color:var(--txt); padding:20px 22px 26px; }
  .pane.right { border-left:1px solid #222; }
  .tag { font-size:11px; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); margin:0 0 2px; }
  .tag .chg { color:var(--working); font-weight:700; }
  .sub { font-size:11px; color:var(--muted); margin:0 0 16px; }

  /* Folder header */
  .folder { background:var(--bgT); border-radius:8px 8px 0 0; padding:8px 11px; display:flex; align-items:center; gap:8px; }
  .folder-title { font-size:13px; font-weight:600; color:var(--txt); }
  .folder-count { font-size:10px; color:var(--muted); }

  /* Session card */
  .card { position:relative; isolation:isolate; background:var(--bgT); border:1px solid var(--border); border-radius:11px; padding:9px 11px; margin-top:8px; display:flex; gap:10px; }
  .rail { width:6px; border-radius:3px; flex-shrink:0; }
  .rail.w{background:var(--working)} .rail.n{background:var(--needs)} .rail.i{background:var(--idle)}
  .session-name { font-size:14px; color:var(--txt); }
  .session-meta { font-size:11px; color:var(--muted); margin-top:2px; }

  /* ── BEFORE: flat weight-400 titles, flat drop shadow ── */
  .before .folder { box-shadow:none; }
  .before .card   { box-shadow:0 1px 2px var(--shadowCard); }
  .before .session-name { font-weight:400; }
  .before .card.sel { border-color:color-mix(in srgb,var(--working) 55%,transparent); background:color-mix(in srgb,var(--working) 5%,var(--bgT)); box-shadow:0 0 0 1px color-mix(in srgb,var(--working) 28%,transparent), 0 1px 2px var(--shadowCard); }

  /* ── AFTER (Tier 1): weight 600 + neutral bevel (inset highlight + deeper drop) ── */
  .after .folder { box-shadow: inset 0 1px 0 var(--rimW), 0 2px 4px var(--shadowCard); }
  .after .card   { box-shadow: inset 0 1px 0 var(--rimW), 0 4px 8px var(--shadowCard); }
  .after .session-name { font-weight:600; }
  .after .folder-title { font-weight:600; }
  /* selected UNCHANGED from today (no boost) — just carries the bevel highlight too */
  .after .card.sel { border-color:color-mix(in srgb,var(--working) 55%,transparent); background:color-mix(in srgb,var(--working) 5%,var(--bgT)); box-shadow:0 0 0 1px color-mix(in srgb,var(--working) 28%,transparent), inset 0 1px 0 var(--rimW), 0 4px 8px var(--shadowCard); }
</style>
</head>
<body>
  <div class="banner"><b>Tier 1 only</b> — session-name weight <b>400 → 600</b> + neutral panel bevel (inset top-highlight + deeper drop). <b>No color rim, no glow boost.</b> Left = before · Right = after · top = light · bottom = dark.</div>

  <div class="grid" id="lightRow"></div>
  <div class="grid" id="darkRow"></div>

<script>
  const list = [
    ["w","refactor-tool-renderer","working · 8.1k · 1m", false],
    ["n","add-title-shadow-tokens","needs you · 2m", false],
    ["w","fix-restart-bridge-race","working · 12.4k · 3m", true],
    ["i","update-docs-tree","idle · 20m", false],
    ["n","wire-discipline-skills","needs you · 6m", false],
  ];
  function card([st,name,meta,sel]){
    return `<div class="card ${sel?'sel':''}"><div class="rail ${st}"></div><div>
      <div class="session-name">${name}</div><div class="session-meta">${meta}</div></div></div>`;
  }
  function pane(mode, variant, side){
    const isAfter = variant === "after";
    const tag = isAfter ? `AFTER · <span class="chg">Tier 1</span>` : "BEFORE · today";
    const sub = isAfter ? "weight 600 + bevel · selected unchanged" : "weight 400 · flat cards";
    return `<div class="pane ${mode} ${variant} ${side}">
      <p class="tag">${tag}</p><p class="sub">${sub}</p>
      <div class="folder"><span style="color:var(--muted)">▸</span><span class="folder-title">pi-agent-dashboard</span><span class="folder-count">5 folders</span></div>
      ${list.map(card).join("")}
    </div>`;
  }
  document.getElementById("lightRow").innerHTML = pane("light","before","left") + pane("light","after","right");
  document.getElementById("darkRow").innerHTML  = pane("dark","before","left")  + pane("dark","after","right");
</script>
</body>
</html>

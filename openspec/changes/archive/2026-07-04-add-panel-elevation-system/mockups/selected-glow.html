<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Boost selected-card glow vs needs-you rims</title>
<style>
  :root {
    --bg:#0a0a0a; --bgT:#1e1e1e; --txt:#e5e5e5; --muted:#585858; --border:rgba(255,255,255,.06);
    --shadowCard:rgba(0,0,0,.4); --rimW:rgba(255,255,255,.10);
    --working:#3b82f6; --needs:#a855f7; --idle:#22c55e;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; background:var(--bg); color:var(--txt); }
  .head { padding:12px 16px; font-size:13px; color:#999; border-bottom:1px solid #222; }
  .cols { display:grid; grid-template-columns:repeat(4,1fr); }
  .col { padding:16px; border-right:1px solid #1a1a1a; }
  .col h3 { font-size:12px; font-weight:700; margin:0 0 3px; }
  .col p { font-size:10px; color:var(--muted); margin:0 0 16px; min-height:38px; }

  .folder { background:var(--bgT); border-radius:8px 8px 0 0; padding:8px 10px; display:flex; align-items:center; gap:7px; box-shadow: inset 0 1px 0 var(--rimW), 0 2px 4px var(--shadowCard); }
  .folder-title { font-size:13px; font-weight:600; }
  .folder-count { font-size:10px; color:var(--muted); }

  .card { position:relative; isolation:isolate; background:var(--bgT); border:1px solid var(--border); border-radius:11px; box-shadow: inset 0 1px 0 var(--rimW), 0 4px 8px var(--shadowCard); padding:9px 11px; margin-top:9px; display:flex; gap:9px; transition:transform .2s; }
  .card.rim-n { box-shadow: inset 0 1px 0 color-mix(in srgb, var(--needs) 50%, var(--rimW)), 0 4px 8px var(--shadowCard); }
  .rail { width:6px; border-radius:3px; flex-shrink:0; }
  .rail.w{background:var(--working)} .rail.n{background:var(--needs)} .rail.i{background:var(--idle)}
  .session-name { font-size:14px; font-weight:600; }
  .session-meta { font-size:11px; color:var(--muted); margin-top:2px; }

  /* ── Selected base (blue border + tint + ring) ── */
  .card.sel { border-color:rgba(59,130,246,.6); background:rgba(59,130,246,.05); box-shadow: 0 0 0 1px rgba(59,130,246,.3), inset 0 1px 0 var(--rimW), 0 4px 8px var(--shadowCard); }
  .sel .glow, .sel .glow-outer, .sel .rim { position:absolute; border-radius:inherit; pointer-events:none; overflow:hidden; container-type:size; }
  .sel .rim { inset:-1px; z-index:-1; padding:1px; -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude; }
  .sel .glow::before,.sel .glow-outer::before,.sel .rim::before {
    content:""; position:absolute; left:50%; top:50%; width:200cqmax; height:200cqmax; margin-left:-100cqmax; margin-top:-100cqmax; animation:spin 13s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  /* glow color helpers — a = fill alpha */
  .sel .glow::before,.sel .glow-outer::before { background:conic-gradient(from 0deg, rgb(59 130 246/var(--ga)), rgb(139 92 246/var(--ga)), rgb(236 72 153/var(--ga)), rgb(34 211 238/var(--ga)), rgb(59 130 246/var(--ga))); }
  .sel .rim::before { background:conic-gradient(from 0deg, rgb(59 130 246/var(--ra)), rgb(139 92 246/var(--ra)), rgb(236 72 153/var(--ra)), rgb(34 211 238/var(--ra)), rgb(59 130 246/var(--ra))); }

  /* G0 current */
  .g0 .glow{inset:-2px;z-index:-2;filter:blur(11px);opacity:.52;--ga:.18}
  .g0 .glow-outer{inset:-7px;z-index:-3;filter:blur(22px);opacity:.36;--ga:.18}
  .g0 .rim{--ra:.45}
  /* G1 bloom: bigger + brighter outer halo */
  .g1 .glow{inset:-3px;z-index:-2;filter:blur(13px);opacity:.68;--ga:.26}
  .g1 .glow-outer{inset:-12px;z-index:-3;filter:blur(30px);opacity:.5;--ga:.24}
  .g1 .rim{--ra:.6}
  /* G2 bloom + lift + brighter border */
  .g2 { transform:translateY(-2px); border-color:rgba(96,165,250,.85)!important; }
  .g2 .glow{inset:-3px;z-index:-2;filter:blur(14px);opacity:.8;--ga:.30}
  .g2 .glow-outer{inset:-16px;z-index:-3;filter:blur(36px);opacity:.6;--ga:.28}
  .g2 .rim{--ra:.72}
  /* G3 over-glow marker */
  .g3 { transform:translateY(-3px) scale(1.015); border-color:rgba(120,180,255,1)!important; }
  .g3 .glow{inset:-4px;z-index:-2;filter:blur(18px);opacity:1;--ga:.45}
  .g3 .glow-outer{inset:-22px;z-index:-3;filter:blur(46px);opacity:.85;--ga:.42}
  .g3 .rim{--ra:.9}
</style>
</head>
<body>
  <div class="head">DARK · identical list (2 purple needs-you rims present) · only the SELECTED card's glow changes L→R · <b>which glow clearly wins without becoming a light bulb?</b></div>
  <div class="cols">
    <div class="col" id="G0"></div>
    <div class="col" id="G1"></div>
    <div class="col" id="G2"></div>
    <div class="col" id="G3"></div>
  </div>
<script>
  // [status,name,meta,selected]
  const list = [
    ["w","refactor-tool-renderer","working · 8.1k · 1m", false],
    ["n","add-title-shadow-tokens","needs you · 2m", false],
    ["w","fix-restart-bridge-race","working · 12.4k · 3m", true],
    ["i","update-docs-tree","idle · 20m", false],
    ["n","wire-discipline-skills","needs you · 6m", false],
  ];
  function card([st,name,meta,sel], g){
    let cls = "card";
    if (sel) cls += " sel " + g;
    else if (st === "n") cls += " rim-n";
    const fx = sel ? `<div class="glow-outer"></div><div class="glow"></div><div class="rim"></div>` : "";
    return `<div class="${cls}">${fx}<div class="rail ${st}"></div><div><div class="session-name">${name}</div><div class="session-meta">${meta}</div></div></div>`;
  }
  const cfg = [
    ["G0","G0 · Current glow","today's selection treatment — baseline","g0"],
    ["G1","G1 · Bloom","wider + brighter outer halo, stronger rim","g1"],
    ["G2","G2 · Bloom + lift","+ translateY(-2px) + brighter border — 'floats above'","g2"],
    ["G3","G3 · Over-glow ⚠","light-bulb marker — expect too much","g3"],
  ];
  for (const [id,title,note,g] of cfg){
    document.getElementById(id).innerHTML =
      `<h3>${title}</h3><p>${note}</p>
       <div class="folder"><span style="color:var(--muted)">▸</span><span class="folder-title">pi-agent-dashboard</span><span class="folder-count">5</span></div>`
      + list.map(c=>card(c,g)).join("");
  }
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Accent-tinted bevel — rim light intensity ladder</title>
<style>
  .base.dark  { --bg:#0a0a0a; --bgT:#1e1e1e; --txt:#e5e5e5; --muted:#585858; --border:rgba(255,255,255,.06); --shadowCard:rgba(0,0,0,.4); --rimW:rgba(255,255,255,.10); }
  .base.light { --bg:#ffffff; --bgT:#f0f0f0; --txt:#1a1a1a; --muted:#aaa; --border:rgba(0,0,0,.06); --shadowCard:rgba(0,0,0,.08); --rimW:rgba(255,255,255,.9); }
  /* status accents */
  .base.dark  { --working:#3b82f6; --needs:#a855f7; --idle:#22c55e; }
  .base.light { --working:#3b82f6; --needs:#a855f7; --idle:#22c55e; }

  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; background:#000; color:#ccc; }
  .toolbar { position:sticky; top:0; z-index:10; padding:10px 16px; background:#111; border-bottom:1px solid #333; font-size:13px; color:#888; }
  .split { display:grid; grid-template-columns:1fr 1fr; }
  .pane { padding:20px; background:var(--bg); color:var(--txt); min-height:100vh; }
  .pane-label { font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin:0 0 14px; }
  .rung { border:1px dashed var(--border); border-radius:12px; padding:2px 12px 14px; margin-bottom:16px; }
  .rung-tag { font-size:10px; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); margin:10px 0 4px; }
  .rung-note { font-size:10px; color:var(--muted); opacity:.8; margin-bottom:6px; }

  .folder { background:var(--bgT); border-radius:8px 8px 0 0; padding:8px 10px; display:flex; align-items:center; gap:7px; }
  .folder-title { font-size:13px; font-weight:600; }
  .folder-count { font-size:10px; color:var(--muted); }
  .card { background:var(--bgT); border:1px solid var(--border); border-radius:11px; box-shadow:0 4px 6px var(--shadowCard); padding:9px 11px; margin-top:8px; display:flex; gap:9px; }
  .rail { width:6px; border-radius:3px; flex-shrink:0; }
  .session-name { font-size:14px; font-weight:600; }
  .session-meta { font-size:11px; color:var(--muted); margin-top:2px; }
  .rail.w{background:var(--working)} .rail.n{background:var(--needs)}
  .cw{--a:var(--working)} .cn{--a:var(--needs)} .fol{--a:var(--working)}

  /* ── P0: neutral bevel (control from depth-ladder) ── */
  .p0 .folder,.p0 .card { box-shadow: inset 0 1px 0 var(--rimW), 0 4px 8px var(--shadowCard); }

  /* ── P1: faint accent rim line (top edge picks up status color) ── */
  .p1 .folder,.p1 .card { box-shadow: inset 0 1px 0 color-mix(in srgb, var(--a) 45%, var(--rimW)), 0 4px 8px var(--shadowCard); }

  /* ── P2: accent rim + accent-tinted floor glow ── */
  .p2 .folder,.p2 .card { box-shadow: inset 0 1px 0 color-mix(in srgb, var(--a) 55%, var(--rimW)), 0 6px 14px color-mix(in srgb, var(--a) 20%, transparent), 0 3px 6px var(--shadowCard); }

  /* ── P3: rim + floor glow + faint accent background wash ── */
  .p3 .folder,.p3 .card { box-shadow: inset 0 1px 0 color-mix(in srgb, var(--a) 55%, var(--rimW)), 0 6px 14px color-mix(in srgb, var(--a) 20%, transparent), 0 3px 6px var(--shadowCard); background: linear-gradient(color-mix(in srgb, var(--a) 9%, var(--bgT)), var(--bgT)); }

  /* ── P4: strong glow — SLOP marker ── */
  .p4 .folder,.p4 .card { box-shadow: inset 0 1px 0 color-mix(in srgb, var(--a) 80%, transparent), 0 0 18px color-mix(in srgb, var(--a) 40%, transparent), 0 6px 14px color-mix(in srgb, var(--a) 30%, transparent); background: linear-gradient(color-mix(in srgb, var(--a) 16%, var(--bgT)), var(--bgT)); }
</style>
</head>
<body>
  <div class="toolbar">Left = LIGHT · Right = DARK · rim-light intensity increases top → bottom. Rim color = STATUS (folder+working = blue, needs-you = purple). Find where "premium" tips to "slop."</div>
  <div class="split">
    <div class="pane light" id="light"></div>
    <div class="pane dark"  id="dark"></div>
  </div>
<script>
  const rungs = [
    ["p0","P0 · Neutral bevel","white/dark rim — no color (control)"],
    ["p1","P1 · Faint accent rim","top edge tinted by status color"],
    ["p2","P2 · Accent rim + floor glow","panel casts a soft status-colored shadow"],
    ["p3","P3 · + accent background wash","faint top-down status tint in the fill"],
    ["p4","P4 · Strong glow  ⚠ slop marker","expect neon / AI-glow cheese"],
  ];
  function block(cls){
    const r=rungs.find(x=>x[0]===cls);
    return `<div class="rung ${cls}">
      <div class="rung-tag">${r[1]}</div><div class="rung-note">${r[2]}</div>
      <div class="folder fol"><span style="color:var(--muted)">▸</span><span class="folder-title">pi-agent-dashboard</span><span class="folder-count">6 folders</span></div>
      <div class="card cw"><div class="rail w"></div><div><div class="session-name">add-title-shadow-tokens</div><div class="session-meta">working · 12.4k · 3m</div></div></div>
      <div class="card cn"><div class="rail n"></div><div><div class="session-name">fix-restart-bridge-race</div><div class="session-meta">needs you · 4m</div></div></div>
    </div>`;
  }
  function render(){
    for(const [id,mode] of [["light","light"],["dark","dark"]]){
      const p=document.getElementById(id);
      p.className=`pane ${mode} base`;
      p.innerHTML=`<p class="pane-label">${mode}</p>`+rungs.map(r=>block(r[0])).join("");
    }
  }
  render();
</script>
</body>
</html>

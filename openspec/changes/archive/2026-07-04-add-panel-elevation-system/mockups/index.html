<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Title-shadow UX validation — light / dark</title>
<style>
  /* ── Real dashboard tokens (base + dracula + github) pulled from themes.ts ── */
  .theme-base.dark   { --bg-primary:#0a0a0a; --bg-secondary:#141414; --bg-tertiary:#1e1e1e; --text-primary:#e5e5e5; --text-secondary:#b0b0b0; --text-muted:#585858; --border-subtle:rgba(255,255,255,.06); --accent-blue:#3b82f6; --accent-purple:#a855f7; --shadow-card:rgba(0,0,0,.4); --shadow-title:0 1px 2px rgba(0,0,0,.55); --emboss:0 1px 0 rgba(0,0,0,.6); }
  .theme-base.light  { --bg-primary:#ffffff; --bg-secondary:#fafafa; --bg-tertiary:#f0f0f0; --text-primary:#1a1a1a; --text-secondary:#444; --text-muted:#aaa; --border-subtle:rgba(0,0,0,.06); --accent-blue:#3b82f6; --accent-purple:#a855f7; --shadow-card:rgba(0,0,0,.08); --shadow-title:0 1px 1px rgba(0,0,0,.06); --emboss:0 1px 0 rgba(255,255,255,.8); }
  .theme-dracula.dark  { --bg-primary:#282a36; --bg-secondary:#21222c; --bg-tertiary:#343746; --text-primary:#f8f8f2; --text-secondary:#ccc9e7; --text-muted:#4d5681; --border-subtle:rgba(255,255,255,.08); --accent-blue:#8be9fd; --accent-purple:#bd93f9; --shadow-card:rgba(0,0,0,.5); --shadow-title:0 1px 2px rgba(0,0,0,.55); --emboss:0 1px 0 rgba(0,0,0,.6); }
  .theme-dracula.light { --bg-primary:#f8f8f2; --bg-secondary:#f0f0e8; --bg-tertiary:#e8e8e0; --text-primary:#282a36; --text-secondary:#44475a; --text-muted:#9ea4c0; --border-subtle:rgba(0,0,0,.06); --accent-blue:#0d7fa5; --accent-purple:#7c5cbf; --shadow-card:rgba(0,0,0,.08); --shadow-title:0 1px 1px rgba(0,0,0,.06); --emboss:0 1px 0 rgba(255,255,255,.8); }
  .theme-github.dark  { --bg-primary:#0d1117; --bg-secondary:#161b22; --bg-tertiary:#21262d; --text-primary:#e6edf3; --text-secondary:#c9d1d9; --text-muted:#6e7681; --border-subtle:rgba(255,255,255,.06); --accent-blue:#58a6ff; --accent-purple:#bc8cff; --shadow-card:rgba(0,0,0,.4); --shadow-title:0 1px 2px rgba(0,0,0,.55); --emboss:0 1px 0 rgba(0,0,0,.6); }
  .theme-github.light { --bg-primary:#ffffff; --bg-secondary:#f6f8fa; --bg-tertiary:#ebedf0; --text-primary:#1f2328; --text-secondary:#424a53; --text-muted:#a1a9b1; --border-subtle:rgba(0,0,0,.06); --accent-blue:#0969da; --accent-purple:#8250df; --shadow-card:rgba(0,0,0,.08); --shadow-title:0 1px 1px rgba(0,0,0,.06); --emboss:0 1px 0 rgba(255,255,255,.7); }

  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background:#000; color:#ddd; }
  .toolbar { position:sticky; top:0; z-index:10; display:flex; gap:16px; align-items:center; padding:10px 16px; background:#111; border-bottom:1px solid #333; font-size:13px; }
  .toolbar label { color:#aaa; }
  select { background:#1a1a1a; color:#eee; border:1px solid #444; border-radius:6px; padding:4px 8px; font-size:13px; }
  .split { display:grid; grid-template-columns:1fr 1fr; min-height:100vh; }
  .pane { padding:24px; background:var(--bg-primary); color:var(--text-primary); }
  .pane-label { font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-muted); margin:0 0 16px; }

  /* Folder header — mirrors WorkspaceHeader / folder title family */
  .folder { background:var(--bg-tertiary); border-radius:8px 8px 0 0; padding:8px 12px; margin-top:20px; display:flex; align-items:center; gap:8px; }
  .folder-title { font-size:13px; font-weight:600; color:var(--text-primary); }
  .folder-count { font-size:10px; color:var(--text-muted); }

  /* Session card — mirrors SessionCard desktop */
  .card { position:relative; background:var(--bg-tertiary); border:1px solid var(--border-subtle); border-radius:12px; box-shadow:0 4px 6px var(--shadow-card); padding:10px 12px; margin:8px 0; display:flex; gap:10px; }
  .card.selected { border-color:color-mix(in srgb, var(--accent-blue) 60%, transparent); box-shadow:0 8px 18px var(--shadow-card); }
  .rail { width:6px; border-radius:3px; background:var(--accent-purple); flex-shrink:0; }
  .rail.working { background:var(--accent-blue); }
  .card-body { flex:1; min-width:0; }
  .session-name { font-size:14px; font-weight:600; color:var(--text-primary); }
  .session-meta { font-size:11px; color:var(--text-muted); margin-top:2px; }

  /* ── Treatments (applied to .folder-title and .session-name) ── */
  .t-flat   .folder-title, .t-flat   .session-name { text-shadow:none; }
  .t-soft   .folder-title, .t-soft   .session-name { text-shadow:var(--shadow-title); }
  .t-emboss .folder-title, .t-emboss .session-name { text-shadow:var(--emboss); }
  /* Accent glow: only the SELECTED card's title glows */
  .t-glow   .folder-title { text-shadow:var(--shadow-title); }
  .t-glow   .session-name { text-shadow:var(--shadow-title); }
  .t-glow   .card.selected .session-name { text-shadow:0 0 10px color-mix(in srgb, var(--accent-blue) 45%, transparent); }

  .group { border:1px dashed var(--border-subtle); border-radius:12px; padding:4px 14px 16px; margin-bottom:22px; }
  .group-tag { font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--text-muted); margin:14px 0 2px; }
</style>
</head>
<body>
  <div class="toolbar">
    <label>Palette
      <select id="palette">
        <option value="base">Base</option>
        <option value="dracula">Dracula</option>
        <option value="github">GitHub</option>
      </select>
    </label>
    <span style="color:#666">Left = LIGHT · Right = DARK · four title treatments stacked in each pane</span>
  </div>

  <div class="split">
    <div class="pane light" id="paneLight"></div>
    <div class="pane dark"  id="paneDark"></div>
  </div>

<script>
  const treatments = [
    ["t-flat",   "A · Flat (control)"],
    ["t-soft",   "B · Soft lift (token, per-mode)"],
    ["t-emboss", "C · Crisp emboss (top-light on light)"],
    ["t-glow",   "D · Soft lift + accent glow on SELECTED only"],
  ];

  function block(cls) {
    return `<div class="group ${cls}">
      <div class="group-tag">${treatments.find(t=>t[0]===cls)[1]}</div>
      <div class="folder">
        <span style="color:var(--text-muted)">▸</span>
        <span class="folder-title">pi-agent-dashboard</span>
        <span class="folder-count">6 folders</span>
      </div>
      <div class="card selected">
        <div class="rail working"></div>
        <div class="card-body">
          <div class="session-name">add-title-shadow-tokens</div>
          <div class="session-meta">working · 12.4k tok · 3m ago</div>
        </div>
      </div>
      <div class="card">
        <div class="rail"></div>
        <div class="card-body">
          <div class="session-name">fix-restart-bridge-race</div>
          <div class="session-meta">needs you · 4m ago</div>
        </div>
      </div>
    </div>`;
  }

  function render() {
    const pal = document.getElementById("palette").value;
    for (const [id, mode] of [["paneLight","light"],["paneDark","dark"]]) {
      const pane = document.getElementById(id);
      pane.className = `pane ${mode} theme-${pal}`;
      pane.innerHTML = `<p class="pane-label">${mode} · theme ${pal}</p>` + treatments.map(t=>block(t[0])).join("");
    }
  }
  document.getElementById("palette").addEventListener("change", render);
  render();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Title-shadow — all 9 themes × light/dark × flat/soft</title>
<style>
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; background:#000; color:#ccc; }
  .toolbar { position:sticky; top:0; z-index:10; display:flex; gap:18px; align-items:center; padding:10px 16px; background:#111; border-bottom:1px solid #333; font-size:13px; flex-wrap:wrap; }
  .toolbar label { color:#aaa; }
  input[type=range]{ vertical-align:middle; }
  .legend { color:#777; font-size:12px; }
  table { width:100%; border-collapse:collapse; }
  th { font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:#888; font-weight:600; padding:8px 6px; position:sticky; top:41px; background:#0b0b0b; z-index:5; }
  td { padding:0; vertical-align:top; }
  .theme-name { writing-mode:horizontal-tb; font-size:12px; font-weight:700; color:#bbb; padding:0 10px; white-space:nowrap; background:#0b0b0b; border-top:1px solid #222; }
  .cell { padding:14px 12px; border:1px solid #1a1a1a; }
  .cell.light { }
  .folder { border-radius:7px 7px 0 0; padding:7px 10px; display:flex; align-items:center; gap:7px; }
  .folder-title { font-size:13px; font-weight:600; }
  .folder-count { font-size:10px; opacity:.6; }
  .card { border:1px solid; border-radius:11px; padding:9px 11px; margin-top:7px; display:flex; gap:9px; }
  .rail { width:6px; border-radius:3px; flex-shrink:0; }
  .session-name { font-size:14px; font-weight:600; }
  .session-meta { font-size:11px; opacity:.55; margin-top:2px; }
</style>
</head>
<body>
  <div class="toolbar">
    <label>Dark shadow α <input id="darkA" type="range" min="0" max="0.9" step="0.05" value="0.85"><span id="darkAv">0.55</span></label>
    <label>Light shadow α <input id="lightA" type="range" min="0" max="0.4" step="0.02" value="0.28"><span id="lightAv">0.06</span></label>
    <span class="legend">Each theme row: LIGHT flat | LIGHT soft | DARK flat | DARK soft. Watch for haloing / muddy glyph edges when soft ≠ flat in a bad way.</span>
  </div>
  <table id="grid">
    <thead><tr>
      <th style="text-align:left;padding-left:12px">Theme</th>
      <th>Light — Flat</th><th>Light — Soft lift</th><th>Dark — Flat</th><th>Dark — Soft lift</th>
    </tr></thead>
    <tbody id="body"></tbody>
  </table>

<script>
  // tokens: [bgPrimary, bgTertiary, textPrimary, textMuted, borderSubtle, accentBlue, accentPurple, shadowCard]
  const T = {
    "Base":        { light:["#ffffff","#f0f0f0","#1a1a1a","#aaaaaa","rgba(0,0,0,.06)","#3b82f6","#a855f7","rgba(0,0,0,.08)"], dark:["#0a0a0a","#1e1e1e","#e5e5e5","#585858","rgba(255,255,255,.06)","#3b82f6","#a855f7","rgba(0,0,0,.4)"] },
    "Dracula":     { light:["#f8f8f2","#e8e8e0","#282a36","#9ea4c0","rgba(0,0,0,.06)","#0d7fa5","#7c5cbf","rgba(0,0,0,.08)"], dark:["#282a36","#343746","#f8f8f2","#4d5681","rgba(255,255,255,.08)","#8be9fd","#bd93f9","rgba(0,0,0,.5)"] },
    "Nord":        { light:["#eceff4","#d8dee9","#2e3440","#9da5b4","rgba(0,0,0,.06)","#5e81ac","#8c6daa","rgba(0,0,0,.08)"], dark:["#2e3440","#3b4252","#eceff4","#5b6375","rgba(255,255,255,.06)","#88c0d0","#b48ead","rgba(0,0,0,.4)"] },
    "GitHub":      { light:["#ffffff","#ebedf0","#1f2328","#a1a9b1","rgba(0,0,0,.06)","#0969da","#8250df","rgba(0,0,0,.08)"], dark:["#0d1117","#21262d","#e6edf3","#6e7681","rgba(255,255,255,.06)","#58a6ff","#bc8cff","rgba(0,0,0,.4)"] },
    "Catppuccin":  { light:["#eff1f5","#ccd0da","#4c4f69","#acb0be","rgba(0,0,0,.06)","#1e66f5","#8839ef","rgba(0,0,0,.08)"], dark:["#1e1e2e","#313244","#cdd6f4","#585b70","rgba(255,255,255,.06)","#89b4fa","#cba6f7","rgba(0,0,0,.4)"] },
    "Tokyo Night": { light:["#e1e2e7","#c4c8da","#3760bf","#8990b3","rgba(0,0,0,.06)","#2e7de9","#9854f1","rgba(0,0,0,.08)"], dark:["#1a1b26","#24283b","#c0caf5","#565a73","rgba(255,255,255,.06)","#7aa2f7","#bb9af7","rgba(0,0,0,.6)"] },
    "Rosé Pine":   { light:["#faf4ed","#f2e9e1","#575279","#b5afba","rgba(0,0,0,.06)","#286983","#907aa9","rgba(0,0,0,.08)"], dark:["#191724","#26233a","#e0def4","#6e6a86","rgba(255,255,255,.06)","#9ccfd8","#c4a7e7","rgba(0,0,0,.6)"] },
    "Solarized":   { light:["#fdf6e3","#e4ddc3","#002b36","#839496","rgba(0,0,0,.06)","#268bd2","#6c71c4","rgba(0,0,0,.08)"], dark:["#002b36","#0a4351","#fdf6e3","#657b83","rgba(255,255,255,.06)","#268bd2","#6c71c4","rgba(0,0,0,.4)"] },
    "Gruvbox":     { light:["#fbf1c7","#ebdbb2","#3c3836","#a89984","rgba(0,0,0,.06)","#458588","#b16286","rgba(0,0,0,.08)"], dark:["#282828","#3c3836","#ebdbb2","#7c6f64","rgba(255,255,255,.06)","#83a598","#d3869b","rgba(0,0,0,.5)"] },
  };

  function cell(tok, mode, soft, darkA, lightA) {
    const [bg, bgT, txt, muted, border, blue, purple, shadowCard] = tok;
    const a = mode === "dark" ? darkA : lightA;
    const ts = soft ? `text-shadow:0 1px 2px rgba(0,0,0,${a});` : "text-shadow:none;";
    return `<td><div class="cell ${mode}" style="background:${bg};color:${txt};">
      <div class="folder" style="background:${bgT};">
        <span style="opacity:.5">▸</span>
        <span class="folder-title" style="${ts}">pi-agent-dashboard</span>
        <span class="folder-count">6</span>
      </div>
      <div class="card" style="background:${bgT};border-color:${border};box-shadow:0 4px 6px ${shadowCard};">
        <div class="rail" style="background:${blue};"></div>
        <div><div class="session-name" style="${ts}">add-title-shadow-tokens</div>
        <div class="session-meta" style="color:${muted};">working · 12.4k · 3m</div></div>
      </div>
      <div class="card" style="background:${bgT};border-color:${border};box-shadow:0 4px 6px ${shadowCard};">
        <div class="rail" style="background:${purple};"></div>
        <div><div class="session-name" style="${ts}">fix-restart-bridge-race</div>
        <div class="session-meta" style="color:${muted};">needs you · 4m</div></div>
      </div>
    </div></td>`;
  }

  function render() {
    const darkA = parseFloat(document.getElementById("darkA").value);
    const lightA = parseFloat(document.getElementById("lightA").value);
    document.getElementById("darkAv").textContent = darkA.toFixed(2);
    document.getElementById("lightAv").textContent = lightA.toFixed(2);
    document.getElementById("body").innerHTML = Object.entries(T).map(([name, tok]) =>
      `<tr><td class="theme-name">${name}</td>` +
      cell(tok.light, "light", false, darkA, lightA) +
      cell(tok.light, "light", true,  darkA, lightA) +
      cell(tok.dark,  "dark",  false, darkA, lightA) +
      cell(tok.dark,  "dark",  true,  darkA, lightA) +
      `</tr>`
    ).join("");
  }
  document.getElementById("darkA").addEventListener("input", render);
  document.getElementById("lightA").addEventListener("input", render);
  render();
</script>
</body>
</html>

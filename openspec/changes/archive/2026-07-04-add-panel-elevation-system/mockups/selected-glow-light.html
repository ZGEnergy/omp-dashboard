<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Selected emphasis in LIGHT theme</title>
<style>
  :root {
    --bg:#ffffff; --bgT:#f0f0f0; --txt:#1a1a1a; --muted:#aaa; --border:rgba(0,0,0,.06);
    --shadowCard:rgba(0,0,0,.08); --rimW:rgba(255,255,255,.9);
    --working:#3b82f6; --needs:#a855f7; --idle:#22c55e;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; background:var(--bg); color:var(--txt); }
  .head { padding:12px 16px; font-size:13px; color:#555; border-bottom:1px solid #e2e2e2; }
  .cols { display:grid; grid-template-columns:repeat(4,1fr); }
  .col { padding:16px; border-right:1px solid #ececec; }
  .col h3 { font-size:12px; font-weight:700; margin:0 0 3px; }
  .col p { font-size:10px; color:#999; margin:0 0 16px; min-height:40px; }

  .folder { background:var(--bgT); border-radius:8px 8px 0 0; padding:8px 10px; display:flex; align-items:center; gap:7px; box-shadow: inset 0 1px 0 var(--rimW), 0 1px 3px var(--shadowCard); }
  .folder-title { font-size:13px; font-weight:600; }
  .folder-count { font-size:10px; color:var(--muted); }

  .card { position:relative; isolation:isolate; background:var(--bgT); border:1px solid var(--border); border-radius:11px; box-shadow: inset 0 1px 0 var(--rimW), 0 3px 6px var(--shadowCard); padding:9px 11px; margin-top:9px; display:flex; gap:9px; transition:transform .2s; }
  .card.rim-n { box-shadow: inset 0 1px 0 color-mix(in srgb, var(--needs) 55%, var(--rimW)), 0 3px 6px var(--shadowCard); }
  .rail { width:6px; border-radius:3px; flex-shrink:0; }
  .rail.w{background:var(--working)} .rail.n{background:var(--needs)} .rail.i{background:var(--idle)}
  .session-name { font-size:14px; font-weight:600; }
  .session-meta { font-size:11px; color:var(--muted); margin-top:2px; }

  /* Selected base: blue border + tint + ring */
  .card.sel { border-color:rgba(59,130,246,.65); background:rgba(59,130,246,.06); box-shadow: 0 0 0 1px rgba(59,130,246,.3), inset 0 1px 0 var(--rimW), 0 3px 6px var(--shadowCard); }
  .sel .glow,.sel .glow-outer,.sel .rim { position:absolute; border-radius:inherit; pointer-events:none; overflow:hidden; container-type:size; }
  .sel .rim { inset:-1px; z-index:-1; padding:1px; -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude; }
  .sel .glow::before,.sel .glow-outer::before,.sel .rim::before { content:""; position:absolute; left:50%; top:50%; width:200cqmax; height:200cqmax; margin-left:-100cqmax; margin-top:-100cqmax; animation:spin 13s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .sel .glow::before,.sel .glow-outer::before { background:conic-gradient(from 0deg, rgb(59 130 246/var(--ga)), rgb(139 92 246/var(--ga)), rgb(236 72 153/var(--ga)), rgb(34 211 238/var(--ga)), rgb(59 130 246/var(--ga))); }
  .sel .rim::before { background:conic-gradient(from 0deg, rgb(59 130 246/var(--ra)), rgb(139 92 246/var(--ra)), rgb(236 72 153/var(--ra)), rgb(34 211 238/var(--ra)), rgb(59 130 246/var(--ra))); }

  /* L0 current light glow (weak) */
  .l0 .glow{inset:-2px;z-index:-2;filter:blur(8px);opacity:.42;--ga:.10}
  .l0 .glow-outer{inset:-6px;z-index:-3;filter:blur(16px);opacity:.29;--ga:.10}
  .l0 .rim{--ra:.45}
  /* L1 boosted glow (same as dark G1) — does it even show on white? */
  .l1 .glow{inset:-3px;z-index:-2;filter:blur(13px);opacity:.68;--ga:.26}
  .l1 .glow-outer{inset:-12px;z-index:-3;filter:blur(30px);opacity:.5;--ga:.24}
  .l1 .rim{--ra:.6}
  /* L2 light-native: strong border + deeper tint + lift + soft blue drop (NOT glow) */
  .l2 { transform:translateY(-2px); border-color:rgba(37,99,235,.9)!important; background:rgba(59,130,246,.10)!important;
        box-shadow: 0 0 0 1px rgba(37,99,235,.35), inset 0 1px 0 var(--rimW), 0 8px 16px rgba(37,99,235,.18)!important; }
  .l2 .glow,.l2 .glow-outer,.l2 .rim{display:none}
  /* L3 hybrid: light-native emphasis + faint rotating rim kept for identity */
  .l3 { transform:translateY(-2px); border-color:rgba(37,99,235,.75)!important; background:rgba(59,130,246,.08)!important;
        box-shadow: inset 0 1px 0 var(--rimW), 0 8px 16px rgba(37,99,235,.16)!important; }
  .l3 .glow,.l3 .glow-outer{display:none}
  .l3 .rim{--ra:.5}
</style>
</head>
<body>
  <div class="head">LIGHT · identical list (2 purple needs-you rims) · only SELECTED emphasis changes L→R · <b>glow washes out on white — what actually keeps selection dominant?</b></div>
  <div class="cols">
    <div class="col" id="L0"></div>
    <div class="col" id="L1"></div>
    <div class="col" id="L2"></div>
    <div class="col" id="L3"></div>
  </div>
<script>
  const list = [
    ["w","refactor-tool-renderer","working · 8.1k · 1m", false],
    ["n","add-title-shadow-tokens","needs you · 2m", false],
    ["w","fix-restart-bridge-race","working · 12.4k · 3m", true],
    ["i","update-docs-tree","idle · 20m", false],
    ["n","wire-discipline-skills","needs you · 6m", false],
  ];
  function card([st,name,meta,sel], g){
    let cls = "card";
    if (sel) cls += " sel " + g;
    else if (st === "n") cls += " rim-n";
    const fx = sel ? `<div class="glow-outer"></div><div class="glow"></div><div class="rim"></div>` : "";
    return `<div class="${cls}">${fx}<div class="rail ${st}"></div><div><div class="session-name">${name}</div><div class="session-meta">${meta}</div></div></div>`;
  }
  const cfg = [
    ["L0","L0 · Current light glow","today's weak light-mode neon — baseline","l0"],
    ["L1","L1 · Dark G1 glow ported","the boosted halo — does colored blur even read on white?","l1"],
    ["L2","L2 · Light-native (no glow)","strong border + deeper tint + lift + soft blue drop","l2"],
    ["L3","L3 · Hybrid","light-native emphasis + faint rotating rim for identity","l3"],
  ];
  for (const [id,title,note,g] of cfg){
    document.getElementById(id).innerHTML =
      `<h3>${title}</h3><p>${note}</p>
       <div class="folder"><span style="color:var(--muted)">▸</span><span class="folder-title">pi-agent-dashboard</span><span class="folder-count">5</span></div>`
      + list.map(c=>card(c,g)).join("");
  }
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Attention routing — mockup</title>
<style>
  /* ── Base tokens (dark) — mirror packages/client/src/index.css :root ── */
  :root {
    --bg-primary: #0a0a0a;
    --bg-secondary: #141414;
    --bg-tertiary: #1e1e1e;
    --bg-surface: #2a2a2a;
    --text-primary: #e5e5e5;
    --text-secondary: #b0b0b0;
    --text-tertiary: #808080;
    --text-muted: #585858;
    --border-subtle: rgba(255,255,255,0.06);
    --accent-green: #22c55e;
    --accent-yellow: #eab308;
    --accent-red: #ef4444;
    --accent-purple: #a855f7;
    --accent-blue: #3b82f6;
    /* Semantic status tokens (derive from accents). */
    --status-needs-you: var(--accent-purple);
    --status-working: var(--accent-yellow);
    --status-idle: var(--accent-green);
    --status-error: var(--accent-red);
    --shadow-card: rgba(0,0,0,0.4);
  }
  /* ── Light overrides — mirror [data-theme="light"] ── */
  .theme-light {
    --bg-primary: #ffffff;
    --bg-secondary: #fafafa;
    --bg-tertiary: #f0f0f0;
    --bg-surface: #e0e0e0;
    --text-primary: #1a1a1a;
    --text-secondary: #444444;
    --text-tertiary: #777777;
    --text-muted: #aaaaaa;
    --border-subtle: rgba(0,0,0,0.06);
    --shadow-card: rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #000;
    color: var(--text-secondary);
  }
  .panel { background: var(--bg-secondary); padding: 16px; }
  .panel-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-muted); margin: 0 0 12px;
  }
  .grid { display: grid; gap: 16px; grid-template-columns: 1fr; }
  @media (min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }

  /* ── Folder card ── */
  .folder {
    background: var(--bg-primary);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    padding: 6px;
  }
  .folder-head {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 4px 8px; flex-wrap: wrap;
  }
  .folder-name { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .folder-name b { font-size: 15px; }
  .folder-count { font-size: 10px; color: var(--text-muted); }

  /* Needs-you pill */
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 6px; border-radius: 999px; font-size: 10px; font-weight: 600;
    color: var(--status-needs-you);
    border: 1px solid color-mix(in srgb, var(--status-needs-you) 45%, transparent);
    background: color-mix(in srgb, var(--status-needs-you) 12%, transparent);
    cursor: pointer;
  }
  .pill svg { width: 12px; height: 12px; }
  @media (max-width: 375px) { .pill .label { display: none; } }

  .sort-toggle {
    margin-left: auto; padding: 2px 4px; border-radius: 6px; cursor: pointer;
    color: var(--text-tertiary); background: none; border: none; line-height: 0;
  }
  .sort-toggle.on { color: var(--status-needs-you); }
  .sort-toggle svg { width: 14px; height: 14px; }

  /* ── Session card ── */
  .card {
    position: relative; display: flex; gap: 8px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-subtle);
    border-radius: 12px; padding: 8px 10px; margin-top: 6px;
    box-shadow: 0 1px 2px var(--shadow-card);
  }
  .card.selected { border-color: color-mix(in srgb, var(--accent-blue) 60%, transparent); }

  /* gutter: icon chip + rail */
  .gutter { position: relative; width: 18px; display: flex; justify-content: center; }
  .chip {
    position: relative; z-index: 1;
    width: 18px; height: 18px; border-radius: 999px;
    background: var(--bg-tertiary);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .chip svg.src { width: 12px; height: 12px; }
  .rail {
    position: absolute; left: 50%; top: 24px; bottom: 4px;
    transform: translateX(-50%); width: 5px; border-radius: 999px;
  }
  /* shape badge */
  .shape {
    position: absolute; right: -4px; bottom: -4px;
    width: 11px; height: 11px; border-radius: 999px;
    background: var(--bg-tertiary);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .shape svg { width: 11px; height: 11px; }

  .body { flex: 1; min-width: 0; }
  .row1 { display: flex; align-items: center; gap: 8px; }
  .name { font-size: 13px; color: var(--text-primary); }
  .age { margin-left: auto; font-size: 11px; color: var(--text-muted); }
  .row2 { margin-top: 3px; font-size: 12px; }
  .activity { display: inline-flex; align-items: center; gap: 3px; }
  .activity svg { width: 11px; height: 11px; }

  /* status color helpers */
  .c-needs { color: var(--status-needs-you); }
  .c-work  { color: var(--status-working); }
  .c-idle  { color: var(--status-idle); }
  .c-error { color: var(--status-error); }
  .c-muted { color: var(--text-tertiary); }
  .r-needs { background: color-mix(in srgb, var(--status-needs-you) 40%, transparent); }
  .r-needs-sel { background: color-mix(in srgb, var(--status-needs-you) 65%, transparent); }
  .r-work  { background: color-mix(in srgb, var(--status-working) 40%, transparent); }
  .r-idle  { background: color-mix(in srgb, var(--status-idle) 40%, transparent); }
  .r-error { background: color-mix(in srgb, var(--status-error) 40%, transparent); }
  .r-ended { background: var(--bg-surface); }
</style>
</head>
<body>
<!-- inline SVG symbol defs (mdi paths) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="i-console" viewBox="0 0 24 24"><path fill="currentColor" d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2M4 6h16v2H4zm0 12v-8h16v8zm2-6h4v2H6z"/></symbol>
  <symbol id="i-comment-q" viewBox="0 0 24 24"><path fill="currentColor" d="M4 2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6l-4 4zm9 14v-2h-2v2zm0-4q.06-1 .9-1.74l.77-.78A2 2 0 0 0 12 6a2 2 0 0 0-2 2H8a4 4 0 0 1 4-4a4 4 0 0 1 4 4q0 1.2-.9 2.1l-1.07 1.1A1.4 1.4 0 0 0 13 12z"/></symbol>
  <symbol id="i-flash" viewBox="0 0 24 24"><path fill="currentColor" d="M7 2v11h3v9l7-12h-4l3-8z"/></symbol>
  <symbol id="i-circle" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="currentColor"/></symbol>
  <symbol id="i-half" viewBox="0 0 24 24"><path fill="currentColor" d="M12 4a8 8 0 0 1 0 16z"/><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/></symbol>
  <symbol id="i-ring" viewBox="0 0 24 24"><circle cx="12" cy="12" r="7" fill="none" stroke="currentColor" stroke-width="2.5"/></symbol>
  <symbol id="i-cross" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2a10 10 0 1 0 0 20a10 10 0 0 0 0-20m4 12.6L14.6 16L12 13.4L9.4 16L8 14.6L10.6 12L8 9.4L9.4 8L12 10.6L14.6 8L16 9.4L13.4 12z"/></symbol>
  <symbol id="i-sort" viewBox="0 0 24 24"><path fill="currentColor" d="M3 13h12v-2H3m0-5v2h18V6M3 18h6v-2H3z"/></symbol>
</svg>

<div class="grid">
  <!-- dark -->
  <section class="panel" id="dark">
    <h2 class="panel-title">Dark theme</h2>
    <div id="folder-dark"></div>
  </section>
  <!-- light -->
  <section class="panel theme-light" id="light" style="background:var(--bg-secondary)">
    <h2 class="panel-title">Light theme</h2>
    <div id="folder-light"></div>
  </section>
</div>

<script>
  const sic = (id, cls) => `<svg class="${cls||''}"><use href="#${id}"/></svg>`;
  // state: {state, name, age, label, labelCls, iconId, railCls, shapeId, selected}
  const cards = [
    { name: "api-refactor", age: "2m", state:"needs", label:'Needs you', labelCls:'c-needs', actIcon:'i-comment-q', railCls:'r-needs', shapeId:'i-circle', shapeCls:'c-needs', selected:true },
    { name: "worker-pool", age: "just now", state:"work", label:'Read', labelCls:'c-work', actIcon:'i-flash', railCls:'r-work', shapeId:'i-half', shapeCls:'c-work' },
    { name: "docs-pass", age: "5m", state:"idle", label:'Idle', labelCls:'c-muted', actIcon:null, railCls:'r-idle', shapeId:'i-ring', shapeCls:'c-idle' },
    { name: "flaky-test", age: "1m", state:"error", label:'Error', labelCls:'c-error', actIcon:'i-cross', railCls:'r-error', shapeId:'i-cross', shapeCls:'c-error' },
    { name: "old-spike", age: "3h", state:"ended", label:'', labelCls:'c-muted', actIcon:null, railCls:'r-ended', shapeId:null, shapeCls:'c-muted', ended:true },
  ];

  function cardHtml(c) {
    const shape = c.shapeId ? `<span class="shape ${c.shapeCls}">${sic(c.shapeId)}</span>` : '';
    const act = c.label ? `<span class="activity ${c.labelCls}">${c.actIcon?sic(c.actIcon):''}${c.label}</span>` : '';
    const iconCls = c.ended ? 'c-muted' : c.labelCls;
    return `<div class="card ${c.selected?'selected':''}">
      <div class="gutter">
        <span class="rail ${c.railCls} ${c.selected?'r-needs-sel':''}"></span>
        <span class="chip ${iconCls}">${sic('i-console','src')}${shape}</span>
      </div>
      <div class="body">
        <div class="row1"><span class="name">${c.name}</span><span class="age">${c.age}</span></div>
        <div class="row2">${act}</div>
      </div>
    </div>`;
  }

  function folderHtml() {
    return `<div class="folder">
      <div class="folder-head">
        <span class="folder-name">~/proj/<b>dashboard</b></span>
        <span class="folder-count">(5)</span>
        <button class="pill" aria-label="1 need you">${sic('i-comment-q')}<span>1</span><span class="label">need you</span></button>
        <button class="sort-toggle on" aria-pressed="true" aria-label="Float blocked sessions to top">${sic('i-sort')}</button>
      </div>
      ${cards.map(cardHtml).join('')}
    </div>`;
  }

  document.getElementById('folder-dark').innerHTML = folderHtml();
  document.getElementById('folder-light').innerHTML = folderHtml();
</script>
</body>
</html>

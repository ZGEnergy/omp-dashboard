name: upstream-sync-inbox

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: upstream-sync-inbox
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main read-only
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Fetch canonical upstream pin
        id: pins
        env:
          UPSTREAM_URL: https://github.com/BlackBeltTechnology/pi-agent-dashboard.git
          UPSTREAM_REF: develop
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 "$UPSTREAM_URL" "$UPSTREAM_REF"
          base_sha="$(git rev-parse HEAD)"
          upstream_sha="$(git rev-parse FETCH_HEAD)"
          canonical_sha="$(git ls-remote "$UPSTREAM_URL" "refs/heads/$UPSTREAM_REF" | awk '{print $1}')"
          test -n "$canonical_sha"
          test "$upstream_sha" = "$canonical_sha"
          git cat-file -e "${base_sha}^{commit}"
          git cat-file -e "${upstream_sha}^{commit}"
          range="${base_sha}..${upstream_sha}"
          git diff --name-only -z "$range" > /tmp/upstream-sync-changed-paths
          git log --format='%H %s' "$range" > /tmp/upstream-sync-commit-text
          printf 'base_sha=%s\n' "$base_sha" >> "$GITHUB_OUTPUT"
          printf 'upstream_sha=%s\n' "$upstream_sha" >> "$GITHUB_OUTPUT"
          printf 'range=%s\n' "$range" >> "$GITHUB_OUTPUT"

      - name: Build immutable detector request
        env:
          BASE_SHA: ${{ steps.pins.outputs.base_sha }}
          UPSTREAM_SHA: ${{ steps.pins.outputs.upstream_sha }}
          UPSTREAM_RANGE: ${{ steps.pins.outputs.range }}
        run: |
          set -euo pipefail
          BASE_SHA="$BASE_SHA" UPSTREAM_SHA="$UPSTREAM_SHA" UPSTREAM_RANGE="$UPSTREAM_RANGE" node --input-type=module > /tmp/upstream-sync-request.json <<'NODE'
          import fs from "node:fs";
          import { buildSyncRequest, deriveRiskFlags } from "./scripts/upstream-sync/detect.mjs";
          const changedPaths = fs.readFileSync("/tmp/upstream-sync-changed-paths").toString().split("\0").filter(Boolean);
          const riskFlags = deriveRiskFlags(changedPaths);
          const ledgerRevision = JSON.parse(fs.readFileSync("upstream-sync/ledger/obligations.json", "utf8")).ledger_revision;
          const request = buildSyncRequest({
            baseSha: process.env.BASE_SHA,
            upstreamSha: process.env.UPSTREAM_SHA,
            range: process.env.UPSTREAM_RANGE,
            changedPaths,
            riskFlags,
            ledgerRevision,
          });
          process.stdout.write(`${JSON.stringify(request, null, 2)}\n`);
          NODE

      - name: Publish immutable inbox issue or comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          UPSTREAM_SHA: ${{ steps.pins.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          node --input-type=module > /tmp/upstream-sync-issue-body <<'NODE'
          import fs from "node:fs";
          import { renderSafeIssueBody } from "./scripts/upstream-sync/detect.mjs";
          const request = JSON.parse(fs.readFileSync("/tmp/upstream-sync-request.json", "utf8"));
          const commitText = fs.readFileSync("/tmp/upstream-sync-commit-text", "utf8");
          process.stdout.write(`${renderSafeIssueBody({ ...request, commit_text: commitText })}\n\nSource commit: https://github.com/BlackBeltTechnology/pi-agent-dashboard/commit/${request.upstream_sha}\n`);
          NODE
          existing="$(gh issue list --repo "$GH_REPO" --state open --json number,title --jq '[.[] | select(.title | startswith("Upstream sync inbox"))][0].number // empty')"
          if [[ -n "$existing" ]]; then
            gh issue comment "$existing" --repo "$GH_REPO" --body-file /tmp/upstream-sync-issue-body
          else
            gh issue create --repo "$GH_REPO" --title "Upstream sync inbox: $UPSTREAM_SHA" --body-file /tmp/upstream-sync-issue-body
          fi

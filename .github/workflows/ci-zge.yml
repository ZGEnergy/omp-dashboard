# ZGEnergy fork gates — required check on main (branch protection: zge-gates).
name: ci-zge

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-zge-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  zge-gates:
    name: zge-gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.22"
          cache: npm

      - name: Install
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: |
          npm ci || npm install --force

      - name: Structural + unit suites + build
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: |
          chmod +x scripts/upstream-sync.sh
          scripts/upstream-sync.sh verify

  # Full monorepo unit suite is green (electron still excluded). Advisory so flakes cannot block land.
  zge-full-tests:
    name: zge-full-tests (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.22"
          cache: npm

      - name: Install
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: |
          npm ci || npm install --force

      - name: Full unit suite
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm test

      - name: Typecheck (advisory)
        continue-on-error: true
        run: npm run lint

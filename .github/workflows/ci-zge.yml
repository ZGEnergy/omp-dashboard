# ZGEnergy fork gates — required checks on main (branch protection: zge-gates, zge-typecheck).
name: ci-zge

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-zge-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  zge-gates:
    name: zge-gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.22"
          cache: npm

      - name: Install
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: |
          npm ci || npm install --force

      - name: Upstream sync structural tests
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm test -- scripts/__tests__/upstream-sync-contracts.test.mjs scripts/__tests__/upstream-sync-validator.test.mjs

  # Required. Failure blocks landing for upstream-sync changes.
  zge-upstream-sync:
    name: zge-upstream-sync
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.22"
          cache: npm

      - name: Install
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: |
          npm ci || npm install --force

      - name: Detect upstream-sync paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            upstream_sync:
              - '.pi/skills/omp-dashboard-upstream-sync/**'
              - 'upstream-sync/**'
              - 'scripts/upstream-sync/**'
              - 'scripts/upstream-sync.sh'
              - 'scripts/__tests__/install-managed-skill.test.mjs'
              - 'scripts/__tests__/upstream-sync-*.test.mjs'
              - '.github/workflows/upstream-sync.yml'
              - '.github/workflows/ci-zge.yml'
              - 'docs/upstream-sync.md'
              - 'docs/AGENTS.md'
              - '.github/workflows/AGENTS.md'
              - 'scripts/AGENTS.md'

      - name: Contract tests
        if: steps.changes.outputs.upstream_sync == 'true'
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm test -- scripts/__tests__/upstream-sync-contracts.test.mjs

      - name: Validator tests
        if: steps.changes.outputs.upstream_sync == 'true'
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm test -- scripts/__tests__/upstream-sync-validator.test.mjs

      - name: Executor tests
        if: steps.changes.outputs.upstream_sync == 'true'
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm test -- scripts/__tests__/upstream-sync-executor.test.mjs

      - name: Detector tests
        if: steps.changes.outputs.upstream_sync == 'true'
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm test -- scripts/__tests__/upstream-sync-detect.test.mjs

      - name: Installer tests
        if: steps.changes.outputs.upstream_sync == 'true'
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm test -- scripts/__tests__/install-managed-skill.test.mjs

      - name: Skill fixture tests
        if: steps.changes.outputs.upstream_sync == 'true'
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm test -- scripts/__tests__/upstream-sync-fixtures.test.mjs

      - name: Skill fixture runner
        if: steps.changes.outputs.upstream_sync == 'true'
        run: node scripts/upstream-sync/run-fixtures.mjs --fixture-root .pi/skills/omp-dashboard-upstream-sync/evals/fixtures --output .pi/skills/omp-dashboard-upstream-sync-workspace/iteration-1/benchmark.json

  # Required. Blocks landing on type errors so they cannot silently accumulate.
  # tsc is deterministic (not flaky), so it gates unlike the advisory full suite.
  zge-typecheck:
    name: zge-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.22"
          cache: npm

      - name: Install
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: |
          npm ci || npm install --force

      - name: Typecheck
        run: npm run lint

  # Full monorepo unit suite is green (electron still excluded). Advisory so flakes cannot block land.
  zge-full-tests:
    name: zge-full-tests (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.22"
          cache: npm

      - name: Install
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: |
          npm ci || npm install --force

      - name: Full unit suite
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm test

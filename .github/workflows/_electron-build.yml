name: Electron build (reusable)

# Reusable workflow that builds the full Electron installer matrix
# (DMG/AppImage/DEB/Windows ZIP + NSIS Setup.exe) across 6 legs.
#
# Consumed by:
#   - .github/workflows/publish.yml         (release flow, source_only_bundle=false)
#   - .github/workflows/ci-electron.yml     (on-demand dev builds, source_only_bundle=true)
#
# This workflow MUST NOT publish to npm or create a GitHub Release. It only
# produces artifacts via actions/upload-artifact. Publishing remains the sole
# responsibility of the caller (publish.yml's `publish` + `github-release`).
# See change: add-ci-electron-on-demand-build.

on:
  workflow_call:
    inputs:
      version:
        description: SemVer string to set via `npm version` on every workspace
        type: string
        required: true
      ref:
        description: Git ref to check out (tag for release, sha for CI)
        type: string
        required: true
      legs:
        description: |
          Matrix subset to run. One of:
            'all'                       → run all 6 legs
            'darwin' | 'linux' | 'win32' → run all legs on that platform
            comma-list of '<platform>-<arch>', e.g. 'darwin-arm64,linux-x64'
        type: string
        required: false
        default: all
      source_only_bundle:
        description: |
          Pass --source-only to bundle-server.mjs. Skips the host-side `npm install`
          so the bundled server's @blackbelt-technology/* deps resolve from local
          workspace source (not the npm registry). Required for CI dev builds where
          the dispatched version has not been published.
        type: boolean
        required: false
        default: false
      artifact_retention_days:
        description: actions/upload-artifact retention (14 for CI, 90 for release)
        type: number
        required: false
        default: 14
      artifact_name_suffix:
        description: |
          Optional suffix appended to artifact name after `electron-<platform>-<arch>`.
          CI dispatches pass `-<sha7>` for cross-run traceability; release passes empty.
        type: string
        required: false
        default: ""
      registry_url:
        description: |
          Ephemeral private registry (Verdaccio) URL for the nightly round-trip.
          When non-empty (e.g. http://localhost:4873): each leg starts its own
          loopback Verdaccio, publishes all non-private workspaces to it, and
          exports npm_config_registry so the bundle's `npm install` resolves
          @blackbelt-technology/* from Verdaccio — a full publish→install→bundle
          round-trip with ZERO public npm writes. Empty (default) → unchanged
          public-npm / source-only paths for publish.yml + ci-electron.yml.
          See change: add-nightly-verdaccio-build.
        type: string
        required: false
        default: ""

jobs:
  # Resolve the matrix subset *before* fan-out. Job-level `if:` cannot reference
  # matrix.* (GitHub Actions evaluates job-level if: prior to matrix expansion),
  # so we precompute the include[] as JSON and feed it to build's strategy via
  # fromJSON(). Filtered legs never spawn runners.
  # See change: add-ci-electron-on-demand-build (Decision 2 in design.md).
  resolve:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      count: ${{ steps.compute.outputs.count }}
    steps:
      - id: compute
        env:
          LEGS: ${{ inputs.legs }}
        run: |
          set -euo pipefail
          ALL='[
            {"os":"macos-14","platform":"darwin","arch":"arm64","node-arch":"arm64"},
            {"os":"macos-15-intel","platform":"darwin","arch":"x64","node-arch":"x64"},
            {"os":"ubuntu-latest","platform":"linux","arch":"x64","node-arch":"x64"},
            {"os":"ubuntu-24.04-arm","platform":"linux","arch":"arm64","node-arch":"arm64"},
            {"os":"windows-latest","platform":"win32","arch":"x64","node-arch":"x64"},
            {"os":"windows-latest","platform":"win32","arch":"arm64","node-arch":"arm64"}
          ]'
          # macos-15-intel runs Intel x86_64 on macOS 15 host. Available until 2027-08.
          # After that, GitHub-hosted Intel macOS is gone — pivot to universal binary or
          # self-hosted runner. See change: add-darwin-x64-build.
          if [ "$LEGS" = "all" ]; then
            FILTERED="$ALL"
          else
            FILTERED=$(echo "$ALL" | jq --arg legs "$LEGS" '
              [ .[] | . as $r | select(
                  ($legs == $r.platform) or
                  ( ($legs | split(",") | map(gsub("^\\s+|\\s+$";"")))
                    | index($r.platform + "-" + $r.arch) )
              ) ]
            ')
          fi
          COUNT=$(echo "$FILTERED" | jq 'length')
          if [ "$COUNT" = "0" ]; then
            echo "::error::inputs.legs='$LEGS' selected zero legs. Accepted: 'all' | 'darwin'|'linux'|'win32' | comma-list of '<platform>-<arch>'." >&2
            exit 1
          fi
          # Emit as {include:[...]} so strategy.matrix consumes it directly.
          MATRIX=$(jq -nc --argjson inc "$FILTERED" '{include:$inc}')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Resolved $COUNT leg(s) for legs='$LEGS':"
          echo "$FILTERED" | jq -r '.[] | "  - \(.platform)-\(.arch) on \(.os)"'

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci ${{ matrix.platform == 'linux' && matrix.arch == 'arm64' && '--ignore-scripts' || '' }}
        timeout-minutes: 15

      - name: Rebuild native modules (Linux arm64)
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        shell: bash
        run: |
          # phantomjs-prebuilt has no linux/arm64 binary and fails install scripts.
          # Use --ignore-scripts above, then rebuild only the modules we need.
          npm rebuild node-pty 2>&1 | tail -5 || true
          # Electron may be hoisted to root node_modules by npm workspaces,
          # or nested under packages/electron/node_modules. Resolve via the
          # tool-registry shell wrapper so layout changes are absorbed in
          # one place. See change: register-build-time-tools.
          ELECTRON_DIR=$(node packages/shared/bin/pi-dashboard-resolve-tool.cjs electron)
          echo "Electron dir: $ELECTRON_DIR"
          cd "$ELECTRON_DIR" && node install.js 2>&1 | tail -5

      - name: Set version from resolved ref
        # No `shell: bash` — single npm invocation works under cmd, pwsh,
        # and bash. Default Windows shell (cmd) handles it without MSYS.
        #
        # IMPORTANT: we use `npm pkg set version=...` instead of `npm
        # version`. `npm version --workspaces` runs each workspace's
        # `prepare` lifecycle and IGNORES `--ignore-scripts` for that
        # implicit prepare run (observed empirically; matches npm/cli#4128).
        # `packages/client`'s prepare invokes vite, which loads the
        # dashboard-plugin vite-plugin and validates plugin manifests against
        # the slot taxonomy. That validation MUST run AFTER sync-versions +
        # lockfile-regen below, otherwise cross-workspace dep specifiers are
        # still stuck at the pre-bump `^<base>` range (which a prerelease
        # `<base>-ci.<...>` does not satisfy per SemVer) and npm resolves a
        # stale registry copy of pi-dashboard-shared, producing taxonomy
        # drift (19 ids instead of 21). `npm pkg set` only edits package.json
        # field values — no lifecycle scripts at all — so prepare fires
        # exactly once, in the explicit `Build client` step below, with
        # coherent specifiers and lockfile. See change:
        # add-ci-electron-on-demand-build.
        run: npm pkg set "version=${{ inputs.version }}" --workspaces --include-workspace-root

      # The three steps below mirror publish.yml's prepare job. Without them,
      # cross-workspace dep specifiers stay at `^<base>` after the version bump
      # to `<base>-ci.<...>`, and `^<base>` does not satisfy prerelease
      # `<base>-ci.<...>` per SemVer. npm then resolves those refs from the
      # registry (stale published `<base>`) instead of the local workspace,
      # producing taxonomy drift (e.g. plugin slot ids unknown to a stale
      # @blackbelt-technology/pi-dashboard-shared). See change:
      # add-ci-electron-on-demand-build (post-fix for stale-registry resolve).
      - name: Sync inter-package dep specifiers
        shell: bash
        run: node scripts/sync-versions.js

      - name: Regenerate package-lock.json with bumped versions
        shell: bash
        run: npm install --package-lock-only --no-audit --no-fund

      - name: Verify lockfile matches workspace versions
        shell: bash
        run: node scripts/verify-lockfile-versions.mjs

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg fakeroot libarchive-tools libfuse2 squashfs-tools
          # AppImage is only supported on x64
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            echo "SKIP_APPIMAGE=true" >> $GITHUB_ENV
          fi

      - name: Download Node.js binary (Unix)
        if: matrix.platform != 'win32'
        run: |
          cd packages/electron
          # Single source of truth (scripts/_node-version.sh). A hardcoded
          # v22.18.0 is rejected by node-guard (nodejs#58515 Fastify crash).
          source scripts/_node-version.sh
          bash scripts/download-node.sh "$BUNDLED_NODE_VERSION" ${{ matrix.platform }} ${{ matrix.node-arch }}

      - name: Download Node.js binary (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          # Single source of truth (scripts/_node-version.sh). v22.18.0 is
          # rejected by node-guard (nodejs#58515 Fastify crash).
          $version = (Select-String -Path packages/electron/scripts/_node-version.sh -Pattern 'BUNDLED_NODE_VERSION="([^"]+)"').Matches[0].Groups[1].Value
          $arch = "${{ matrix.node-arch }}"
          $url = "https://nodejs.org/dist/$version/node-$version-win-$arch.zip"
          $outDir = "packages/electron/resources/node"
          New-Item -ItemType Directory -Force -Path $outDir
          Invoke-WebRequest -Uri $url -OutFile node.zip
          Expand-Archive -Path node.zip -DestinationPath temp-node
          Copy-Item "temp-node/node-$version-win-$arch/node.exe" "$outDir/"
          Copy-Item -Recurse "temp-node/node-$version-win-$arch/node_modules" "$outDir/"
          Remove-Item -Recurse -Force temp-node, node.zip

      - name: Build client
        run: npm run build

      # ── Nightly Verdaccio round-trip (only when registry_url is set) ──────
      # Each leg stands up its OWN loopback Verdaccio, publishes every
      # non-private workspace (at inputs.version) to it, then routes npm at
      # it so the bundle step's `npm install` resolves @blackbelt-technology/*
      # from Verdaccio instead of public npm — full publish→install→bundle
      # round-trip, ZERO public npm writes. Each action is its own step so a
      # failure propagates on pwsh (Windows) and bash alike. No `shell: bash`
      # (node-native — Windows-safe). See change: add-nightly-verdaccio-build.
      - name: Install Verdaccio (nightly)
        if: ${{ inputs.registry_url != '' }}
        run: npm install -g verdaccio

      - name: Start Verdaccio (nightly)
        if: ${{ inputs.registry_url != '' }}
        env:
          REGISTRY: ${{ inputs.registry_url }}
        run: node scripts/nightly-verdaccio-serve.mjs

      - name: Publish workspaces to Verdaccio (nightly)
        if: ${{ inputs.registry_url != '' }}
        env:
          REGISTRY: ${{ inputs.registry_url }}
          NIGHTLY_VERSION: ${{ inputs.version }}
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/nightly-verdaccio-publish.mjs

      - name: Route npm to Verdaccio for the bundle install (nightly)
        if: ${{ inputs.registry_url != '' }}
        env:
          REGISTRY: ${{ inputs.registry_url }}
        run: node -e "require('fs').appendFileSync(process.env.GITHUB_ENV, 'npm_config_registry=' + process.env.REGISTRY + '\n')"

      # ---------------------------------------------------------------------
      # Vestigial bundle steps removed.
      #
      # The previous "Bundle first-party recommended extensions" and
      # "Bundle offline npm cache" steps invoked
      # packages/electron/scripts/bundle-recommended-extensions.mjs and
      # bundle-offline-packages.mjs respectively. Both scripts were deleted
      # in commit d3fe2163 ("feat(eliminate-electron-runtime-install):
      # Phase 2 + Phase 3 + Phase 5 partial", 2026-05-23) along with the
      # entire dependency-installer / offline-packages machinery they fed.
      # Under the immutable-bundle architecture the bundled server is
      # produced solely by bundle-server.mjs and there is no separate
      # recommended-extensions resource or offline cache tarball.
      #
      # The downstream "Smoke assertion — offline bundle resources present"
      # step has been removed for the same reason — it asserted a resource
      # path (resources/offline-packages/) that no longer exists.
      #
      # See change: eliminate-electron-runtime-install (deletion) and
      # change: add-ci-electron-on-demand-build (workflow cleanup that
      # re-aligned _electron-build.yml with the post-deletion reality).
      # ---------------------------------------------------------------------

      - name: Bundle dashboard server
        # Node-native (.mjs) — no shell, no MSYS path translation, runs
        # identically on Linux/macOS/Windows. See change:
        # eliminate-bash-on-windows-runners.
        #
        # `--source-only` argv is appended ONLY when `inputs.source_only_bundle
        # == true`. Since change fix-ci-electron-runnable-bundles, both active
        # workflow callers (publish.yml + ci-electron.yml) pass `false`, so
        # `npm install --omit=dev` runs in-workflow and the bundle ships
        # complete with `resources/server/node_modules/`. The next step
        # ("Assert runnable bundle") gates this invariant per-leg.
        #
        # The `source_only_bundle` input is retained as a workflow-level escape
        # hatch for any future caller that needs to defer the install step to
        # a downstream stage (e.g. Docker cross-compile via docker-make.sh,
        # which still invokes bundle-server.mjs --source-only directly via its
        # own script path — not via this workflow input). No active workflow
        # caller passes `true` today.
        # GIT_TARGET_ARCH selects the bundled dugite-native git arch on win32
        # legs (decoupled from node-pty arch — win32-arm64 ships native arm64
        # git but an x64-emulated server). No-op on mac/linux. download-git
        # failures + incomplete trees fail this step via the GO/NO-GO inside
        # bundle-server.mjs. See change: embed-git-bash-on-windows.
        env:
          GIT_TARGET_ARCH: ${{ matrix.arch }}
        run: node packages/electron/scripts/bundle-server.mjs ${{ inputs.source_only_bundle && '--source-only' || '' }}

      - name: Assert runnable bundle (cli.ts exists)
        # Defence-in-depth gate: when `inputs.source_only_bundle == false`,
        # `bundle-server.mjs` MUST have produced a complete bundle with
        # `resources/server/node_modules/@blackbelt-technology/pi-dashboard-server/src/cli.ts`
        # materialised by the npm-workspaces resolver. Without this assertion,
        # a regression in scripts/sync-versions.js or a future change to the
        # bundle layout could silently ship a non-runnable artefact — the
        # exact failure mode `fix-ci-electron-runnable-bundles` was created to
        # close. The runtime-side selectLaunchSource throws
        # `BundledServerMissingError` if cli.ts is absent at launch; this gate
        # surfaces that failure at build time on every leg instead.
        #
        # Node-native (`node -e`) so the step runs identically on Linux/macOS/
        # Windows. No `shell: bash` (Windows-reachable invariant pinned by
        # packages/shared/src/__tests__/no-bash-on-windows.test.ts).
        if: ${{ inputs.source_only_bundle == false }}
        # GIT_TARGET_ARCH lets the win32 git libdir assertion pick the exact
        # expected dir (mingw64 x64 / clangarm64 arm64). See change:
        # embed-git-bash-on-windows.
        env:
          GIT_TARGET_ARCH: ${{ matrix.arch }}
        run: node packages/electron/scripts/assert-runnable-bundle.mjs

      - name: Assert bundled plugins complete
        # Built-bundle plugin-completeness gate: after bundle-server.mjs runs,
        # the bundle's resources/plugins/ MUST contain every non-fixture
        # runtime plugin discoverable in packages/* (manifest-based predicate).
        # Flags kb-plugin-style omissions at build time, on every leg, before
        # the artifact is uploaded. Runs whenever a full (non-source-only)
        # bundle was produced. Node-native — Windows-safe. See change:
        # add-nightly-verdaccio-build.
        if: ${{ inputs.source_only_bundle == false }}
        run: node packages/electron/scripts/assert-bundled-plugins-complete.mjs

      - name: Assert no wmic in bundle (PowerShell-only Windows introspection)
        # Enforces spec scenario "No wmic shell-invocation anywhere in shipped
        # code" (change: replace-wmic-with-powershell). wmic removed by default
        # on Win 11 22H2+; every introspection path uses PowerShell
        # Get-CimInstance. Scans only bundled @blackbelt-technology code; a
        # reintroduced exec/spawn(...wmic) fails the build on every leg.
        # Node-native (no bash) — Windows-reachable invariant.
        if: ${{ inputs.source_only_bundle == false }}
        run: node packages/electron/scripts/assert-no-wmic-in-bundle.mjs

      - name: Use x64 Node.js for Windows arm64 bundled server
        if: matrix.platform == 'win32' && matrix.arch == 'arm64'
        shell: pwsh
        run: |
          # node-pty has no win32-arm64 prebuilds, so bundle x64 Node.js + native modules
          # Windows ARM64 runs x64 binaries via emulation (WoW64)
          # Single source of truth (scripts/_node-version.sh); v22.18.0 is
          # rejected by node-guard (nodejs#58515 Fastify crash).
          $version = (Select-String -Path packages/electron/scripts/_node-version.sh -Pattern 'BUNDLED_NODE_VERSION="([^"]+)"').Matches[0].Groups[1].Value
          $outDir = "packages/electron/resources/node"
          Remove-Item -Recurse -Force $outDir
          New-Item -ItemType Directory -Force -Path $outDir
          $url = "https://nodejs.org/dist/$version/node-$version-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile node-x64.zip
          Expand-Archive -Path node-x64.zip -DestinationPath temp-node-x64
          Copy-Item "temp-node-x64/node-$version-win-x64/node.exe" "$outDir/"
          Copy-Item -Recurse "temp-node-x64/node-$version-win-x64/node_modules" "$outDir/"
          Remove-Item -Recurse -Force temp-node-x64, node-x64.zip
          Write-Host "Bundled x64 Node.js for Windows ARM64 (runs via WoW64 emulation)"

      # (Removed: "Patch AppImage maker script" — the @pengx17 Forge AppImage
      # maker is replaced by electron-builder's native AppImage target, which
      # ships its own AppRun and needs no patch. See change:
      # fix-electron-auto-update-pipeline.)

      # ── macOS: Forge package (signs) → electron-builder DMG + metadata ──
      # forge.config.ts no longer has a DMG maker; electron-builder produces the
      # DMG from the Forge-packaged .app via --prepackaged so the build also
      # emits latest-mac.yml + app-update.yml that electron-updater needs.
      # forge package applies osxSign/osxNotarize (gated on APPLE_IDENTITY);
      # CSC_IDENTITY_AUTO_DISCOVERY=false stops electron-builder re-signing.
      # See change: fix-electron-auto-update-pipeline (D1).
      # ⚠️ CI-VALIDATE on a test tag: confirm (1) the packaged dir glob resolves
      # for the universal build, (2) electron-builder tags the DMG by host arch
      # (no arm64/x64 basename collision), (3) the .app keeps its Developer-ID
      # signature through the DMG wrap.
      - name: Make Electron distributables (macOS)
        if: matrix.platform == 'darwin'
        # MACOSX_DEPLOYMENT_TARGET pins Mach-O minos for every binary the build
        # produces. Pairs with extendInfo.LSMinimumSystemVersion in forge.config.
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.15"
        run: |
          set -euo pipefail
          cd packages/electron
          # 1. Package (+ sign + notarize) the universal .app via Forge.
          ../../node_modules/.bin/electron-forge package --arch=${{ matrix.arch }} --platform=darwin
          # electron-builder --mac --prepackaged expects the .app PATH (not its
          # parent dir, unlike --win/--linux which take the unpacked dir).
          # Passing the dir produces a malformed bundle. See change:
          # fix-electron-auto-update-pipeline (CI-validate fix).
          APP_PATH=$(find out -maxdepth 2 -name '*.app' -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Forge .app not found under out/"; ls -laR out | head -50 || true; exit 1
          fi
          echo "App bundle: $APP_PATH"
          # 2. Wrap into a DMG + emit latest-mac.yml + app-update.yml. Do NOT
          #    re-sign (Forge already did): disable cert auto-discovery.
          export CSC_IDENTITY_AUTO_DISCOVERY=false
          # Tag the DMG basename by host arch so the arm64 + x64 legs don't
          # collide on upload (softprops dedups by basename).
          npx electron-builder --mac dmg \
            --prepackaged "$APP_PATH" \
            --config electron-builder.yml \
            -c.mac.artifactName='PI-Dashboard-${version}-${{ matrix.arch }}.${ext}' \
            --publish never

      # ── Linux: Forge make (.deb) → electron-builder AppImage + metadata ──
      - name: Make Electron distributables (Linux)
        if: matrix.platform == 'linux'
        run: |
          set -euo pipefail
          cd packages/electron
          # 1. Forge make produces the .deb (the only remaining Forge maker) and
          #    leaves the packaged app dir under out/.
          ../../node_modules/.bin/electron-forge make --arch=${{ matrix.arch }} --platform=linux
          PKG_DIR=$(find out -maxdepth 1 -type d -name 'PI-Dashboard-linux-*' | head -1)
          if [ -z "$PKG_DIR" ]; then
            echo "::error::Forge packaged dir not found under out/"; ls -la out || true; exit 1
          fi
          echo "Packaged dir: $PKG_DIR"
          # 2. AppImage + latest-linux.yml + app-update.yml from the packaged dir.
          npx electron-builder --linux AppImage \
            --prepackaged "$PKG_DIR" \
            --config electron-builder.yml \
            -c.linux.artifactName='PI-Dashboard-${version}-${{ matrix.arch }}.${ext}' \
            --publish never

      - name: Verify macOS deployment target floor (10.15)
        # Defensive check: extract LSMinimumSystemVersion from the produced
        # Info.plist and otool the inner Mach-O minos. Fail the job on any
        # drift so a future runner-image upgrade cannot silently raise the
        # floor without anyone noticing. See change: add-darwin-x64-build (6b).
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          DMG=$(find packages/electron/out/make -name '*.dmg' | head -1)
          if [ -z "$DMG" ]; then
            echo "::error::No DMG produced — cannot verify deployment target"
            exit 1
          fi
          echo "Mounting $DMG ..."
          MOUNT_OUT=$(hdiutil attach -nobrowse -readonly "$DMG")
          MOUNT_POINT=$(echo "$MOUNT_OUT" | grep '/Volumes/' | awk '{$1=$2=""; sub(/^ +/,""); print}' | tail -1)
          if [ -z "$MOUNT_POINT" ] || [ ! -d "$MOUNT_POINT" ]; then
            echo "::error::Failed to mount DMG"
            echo "$MOUNT_OUT"
            exit 1
          fi
          APP=$(find "$MOUNT_POINT" -maxdepth 1 -name '*.app' -type d | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle inside DMG"
            hdiutil detach "$MOUNT_POINT" -quiet || true
            exit 1
          fi
          echo "Inspecting $APP"
          ls -la "$APP/Contents" 2>/dev/null || echo "  (no Contents/ — unexpected app layout)"
          # 1. LSMinimumSystemVersion in Info.plist. Locate the plist
          # dynamically (the electron-builder app bundle name differs from the
          # legacy Forge maker output). See change: fix-electron-auto-update-pipeline.
          INFO_PLIST=$(find "$APP" -path '*/Contents/Info.plist' -maxdepth 2 2>/dev/null | head -1)
          MIN_OS=$(plutil -extract LSMinimumSystemVersion raw "$INFO_PLIST" 2>/dev/null || echo "missing")
          echo "  Info.plist ($INFO_PLIST) LSMinimumSystemVersion = $MIN_OS"
          if [ "$MIN_OS" != "10.15" ]; then
            echo "::error::LSMinimumSystemVersion is '$MIN_OS', expected '10.15'. Pin via packagerConfig.extendInfo in packages/electron/forge.config.ts. See change: add-darwin-x64-build."
            hdiutil detach "$MOUNT_POINT" -quiet || true
            exit 1
          fi
          # 2. Mach-O LC_BUILD_VERSION minos for the main binary.
          # Per-arch floor: x64 must be 10.x (10.15 target); arm64 must be 11.x
          # (Apple Silicon hardware launched on Big Sur/11.0 — arm64 binaries
          # CANNOT declare minos < 11). Anything higher than the arch's floor
          # major means the runner SDK leaked into the build.
          BIN=$(find "$APP/Contents/MacOS" -maxdepth 1 -type f 2>/dev/null | head -1)
          if [ -n "$BIN" ] && [ -f "$BIN" ]; then
            # Capture minos via a state-machine awk that's tolerant of otool's
            # actual layout (LC_BUILD_VERSION header is followed by cmd /
            # cmdsize / platform / minos lines, then the next Load command).
            # Disable pipefail locally because grep may not match if the
            # binary uses LC_VERSION_MIN_MACOSX (older format) instead of
            # LC_BUILD_VERSION; we fall through to the legacy probe below.
            set +o pipefail
            MINOS=$(otool -l "$BIN" 2>/dev/null | awk '
              /^Load command/ { in_bv = 0 }
              /LC_BUILD_VERSION/ { in_bv = 1; next }
              in_bv && /minos/ { print $2; exit }
            ')
            # Fall back to LC_VERSION_MIN_MACOSX (older Mach-Os) if needed.
            if [ -z "$MINOS" ]; then
              MINOS=$(otool -l "$BIN" 2>/dev/null | awk '
                /^Load command/ { in_vm = 0 }
                /LC_VERSION_MIN_MACOSX/ { in_vm = 1; next }
                in_vm && /version/ { print $2; exit }
              ')
            fi
            set -o pipefail
            echo "  Mach-O minos = ${MINOS:-<not-found>}"
            if [ -z "$MINOS" ]; then
              echo "::warning::Could not extract minos from $BIN — skipping otool floor check"
            else
              MAJOR="${MINOS%%.*}"
              # Per-arch expected floor major version
              case "${{ matrix.arch }}" in
                x64)   EXPECTED_MAJOR=10 ;;
                arm64) EXPECTED_MAJOR=11 ;;
                *)     EXPECTED_MAJOR=10 ;;
              esac
              if ! [ "$MAJOR" -eq "$MAJOR" ] 2>/dev/null; then
                echo "::warning::minos major is non-numeric ('$MAJOR') — skipping floor check"
              elif [ "$MAJOR" -gt "$EXPECTED_MAJOR" ]; then
                echo "::error::Mach-O minos is '$MINOS' (major=$MAJOR), expected major=$EXPECTED_MAJOR for arch=${{ matrix.arch }}. The runner SDK leaked into the binary. Verify MACOSX_DEPLOYMENT_TARGET is set on the make step. See change: add-darwin-x64-build."
                hdiutil detach "$MOUNT_POINT" -quiet || true
                exit 1
              fi
            fi
          else
            echo "::warning::Main binary not found at $BIN — skipping otool check"
          fi
          hdiutil detach "$MOUNT_POINT" -quiet || true
          echo "✓ Deployment target floor verified: 10.15"

      - name: Launch-smoke the .app
        # Dynamic boot proof: exec the just-built .app's inner Mach-O and
        # assert the four-point healthy-launch contract (health 200,
        # starter==Electron, server.log non-empty, no FATAL). Runs in-job
        # on the GitHub-hosted macOS runner, which (unlike the headless
        # Windows/Linux GH runners) provides a real Aqua/WindowServer
        # session. Each leg execs its OWN native arch — macos-14→arm64,
        # macos-15-intel→x64 — so there is no cross-arch exec. Boot-proof,
        # NOT floor-proof: runner OS (14/15) is above the 10.15 floor; the
        # static otool minos check above is the (label-only) floor guard.
        # See change: add-macos-electron-launch-smoke.
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          if ! ./qa/tests/09-electron-mac-launch.sh; then
            echo "::error::macOS launch smoke failed for ${{ matrix.arch }}"
            echo "--- Electron stdout/stderr (tail) ---"
            tail -120 /tmp/electron-stdout-*.log 2>/dev/null || echo "(no electron log)"
            echo "--- server.log (tail) ---"
            tail -120 "$HOME/.pi/dashboard/server.log" 2>/dev/null || echo "(no server.log)"
            exit 1
          fi

      - name: Package Electron (Windows — no maker configured)
        # Runs for both win32-x64 and win32-arm64. forge.config.ts has no
        # Windows maker, so we use `forge package` to produce the unpacked
        # app dir at `out/PI-Dashboard-win32-<arch>/`. The next step
        # ("Build Windows ZIP and NSIS Setup.exe") consumes that dir.
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          Set-Location packages\electron
          ..\..\node_modules\.bin\electron-forge.cmd package --arch=${{ matrix.arch }} --platform=win32
          Write-Host "Packaged output:"
          Get-ChildItem out\ -ErrorAction SilentlyContinue | Format-Table

      - name: Build Windows ZIP and NSIS Setup.exe
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          $packaged = Resolve-Path "packages/electron/out/PI-Dashboard-win32-$arch" -ErrorAction SilentlyContinue
          if (-not $packaged) {
            Write-Host "::error::Packaged directory not found. Contents of out/:"
            Get-ChildItem -Path "packages/electron/out/" -ErrorAction SilentlyContinue | Format-Table
            exit 1
          }
          Write-Host "Found packaged dir: $packaged"
          # ZIP archive
          $zipDir = "packages/electron/out/make/zip/$arch"
          New-Item -ItemType Directory -Force -Path $zipDir
          Compress-Archive -Path $packaged -DestinationPath "$zipDir/PI-Dashboard-win32-$arch.zip"
          # NSIS Setup.exe (per-user installer via electron-builder).
          # See change: restore-windows-nsis-installer.
          cd packages/electron
          # 1. Derive Pi-branded ICO + BMP installer assets from master.png.
          node scripts/build-installer-assets.mjs
          # 2. Build the per-user NSIS Setup.exe. No code-signing (no cert
          #    configured); CSC_* envs short-circuit electron-builder's
          #    auto cert discovery + osslsigncode PE rewrite.
          $env:CSC_IDENTITY_AUTO_DISCOVERY = "false"
          $env:WIN_CSC_LINK = ""
          $env:CSC_LINK = ""
          # --publish never: electron-builder auto-detects CI and otherwise
          # tries to publish to GitHub Releases (needs GH_TOKEN). We only build.
          npx electron-builder --win nsis --$arch `
            --prepackaged "out/PI-Dashboard-win32-$arch" `
            --config electron-builder-nsis.json `
            --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}-${{ matrix.arch }}${{ inputs.artifact_name_suffix }}
          path: packages/electron/out/make/**/*
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      # NSIS Setup.exe smoke test — runs on the same windows-latest runner that
      # just built it. Per-user /S install needs no admin/UAC, so it works on
      # the runner. See change: restore-windows-nsis-installer.
      #   - install + registry + uninstall: HARD gates (deterministic, offline).
      #   - launch (/api/health): x64 only (runner is x64; arm64 binary can't
      #     exec here — needs a windows-11-arm runner) and NON-FATAL because
      #     first-run bootstrap is network/time-sensitive. Harden to fatal once
      #     observed stably green.
      - name: Smoke-test NSIS Setup.exe (install/uninstall)
        # x64 only: the runner is x64 Windows and cannot execute an arm64
        # Setup.exe/app, so the arm64 silent install never extracts files
        # (pi-dashboard.exe absent → 150s timeout). The arm64 installer still
        # builds + uploads above; its install/uninstall is validated on real
        # arm64 hardware via the QA harness, same as the launch check. See
        # change: restore-windows-nsis-installer.
        if: matrix.platform == 'win32' && matrix.arch == 'x64'
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          $setup = Get-ChildItem "packages/electron/out/make/nsis/PI-Dashboard-Setup-*-$arch.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $setup) {
            Write-Host "::error::NSIS Setup.exe not found for $arch"
            Get-ChildItem -Recurse "packages/electron/out/make/nsis" -ErrorAction SilentlyContinue | Format-Table
            exit 1
          }
          $setupPath = $setup.FullName
          Write-Host "Smoke-testing $setupPath"
          # Headless-safe HARD gates. Launch / server-start is intentionally NOT
          # tested here: pi-dashboard.exe is a GUI-subsystem binary and
          # GitHub-hosted runners have no interactive desktop session, so the
          # Electron main process never reaches the server-spawn step (verified:
          # process stays alive, server.log never created, stdout/stderr empty).
          # Launch + server-start validation runs on a VM (qa/tests/07-electron-
          # bootstrap-v2.ps1 + windows-nsis-launch.ps1 via the
          # automate-windows-remote-qa harness) or by manual install on a desktop.
          ./qa/tests/windows-nsis-install.ps1 -Setup $setupPath
          ./qa/tests/windows-nsis-no-permachine.ps1
          ./qa/tests/windows-nsis-branding.ps1 -Setup $setupPath
          ./qa/tests/windows-nsis-uninstall.ps1

name: CI

# Cheap PR safety net: lint + test + build on Node 22.
# The standalone-install-smoke matrix moved to `_smoke.yml` (reusable),
# triggered manually via `ci-smoke.yml` or automatically as the release
# gate inside `publish.yml`. See change: gate-publish-on-smoke-and-tests.

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm ci` fails when package-lock.json omits a platform-specific
      # optional binary for the runner OS (npm optional-deps bug, npm/cli#4828)
      # — e.g. a lockfile generated on macOS lacks @rollup/rollup-linux-x64-gnu,
      # so `npm ci` on ubuntu-latest cannot resolve it. Fall back to a clean
      # install that re-resolves the full optional tree for this platform.
      - name: Install dependencies
        run: npm ci || (echo "npm ci failed (likely npm/cli#4828 optional-deps); retrying clean install" && rm -rf node_modules package-lock.json && npm install)
      - run: npm run lint
      # Hard-gates Tier A (error-severity) regressions; Tier B/C (warn) only annotate.
      - name: Biome static analysis (Tier A gate, warn-tier annotate)
        run: npx biome lint . --reporter=github
      - run: npm test
      # Build and fail on the mechanical warnings removed by
      # `fix-vite-build-warnings`. The @mdi/js dynamic-import warning and the
      # oversized-chunk (>700 kB) warning are intentionally OUT of scope here
      # (owned by `shrink-client-index-chunk`) and must NOT fail this gate.
      - name: Build (fail on regressed warnings)
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/build.log
          fail=0
          if grep -q "Unexpected token" /tmp/build.log; then
            echo "::error::CSS parse error (Unexpected token) re-appeared in the build log"; fail=1
          fi
          if grep -q "Circular chunk" /tmp/build.log; then
            echo "::error::Circular chunk warning re-appeared in the build log"; fail=1
          fi
          if grep -qE "(PdfPreview\.tsx|known-servers-api\.ts) is dynamically imported" /tmp/build.log; then
            echo "::error::PdfPreview / known-servers-api dynamic-import warning re-appeared"; fail=1
          fi
          exit $fail

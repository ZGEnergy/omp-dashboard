<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>PI Dashboard — Connecting…</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif;
         display: flex; align-items: center; justify-content: center;
         height: 100vh; margin: 0; background: #0d1117; color: #c9d1d9; }
  .container { text-align: center; max-width: 520px; padding: 0 24px; }
  .pi { font-size: 72px; color: #4a90d9; margin-bottom: 16px; }
  .status { font-size: 14px; color: #8b949e; min-height: 20px; }
  .error { display: none; margin-top: 24px; text-align: left; }
  .error h3 { color: #f85149; margin: 0 0 12px; font-size: 16px; }
  .error p { margin: 0 0 8px; font-size: 13px; line-height: 1.5; color: #8b949e; }
  .error code { background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  .actions { display: flex; gap: 8px; align-items: center; margin: 16px 0 12px; flex-wrap: wrap; }
  .primary-btn { background: #238636; border: 1px solid #2ea043; border-radius: 6px;
    color: #fff; padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 500; }
  .primary-btn:hover:not(:disabled) { background: #2ea043; }
  .primary-btn:disabled { background: #30363d; border-color: #30363d; color: #8b949e; cursor: not-allowed; }
  .link-btn { background: transparent; border: none; color: #4a90d9; padding: 8px 4px;
    font-size: 13px; cursor: pointer; text-decoration: underline; }
  .link-btn:hover { color: #6cb6ff; }
  .secondary-btn { background: #21262d; border: 1px solid #30363d; border-radius: 6px;
    color: #c9d1d9; padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 500; }
  .secondary-btn:hover:not(:disabled) { background: #30363d; border-color: #484f58; }
  .secondary-btn:disabled { background: #161b22; color: #6e7681; cursor: not-allowed; }
  .danger-btn { background: transparent; border: none; color: #f85149; padding: 8px 4px;
    font-size: 13px; cursor: pointer; text-decoration: underline; }
  .danger-btn:hover { color: #ff7b72; }
  .diagnosis { margin: 12px 0; padding: 10px 12px; background: #161b22;
    border-left: 3px solid #d29922; border-radius: 4px; font-size: 13px; color: #c9d1d9;
    line-height: 1.5; }
  .diagnosis.error-tone { border-left-color: #f85149; }
  details.advanced { margin-top: 12px; }
  details.advanced summary { color: #8b949e; font-size: 12px; cursor: pointer; user-select: none; }
  details.advanced summary:hover { color: #c9d1d9; }
  details.advanced .advanced-body { margin-top: 8px; padding-left: 4px; }
  .server-btn { display: flex; justify-content: space-between; align-items: center; width: 100%;
    padding: 8px 12px; margin-bottom: 6px; background: #161b22; border: 1px solid #30363d;
    border-radius: 6px; color: #c9d1d9; cursor: pointer; font-size: 13px; text-align: left; }
  .server-btn:hover { border-color: #4a90d9; background: #1c2128; }
  .server-label { font-weight: 500; }
  .server-addr { color: #8b949e; font-size: 12px; }
  details { margin-top: 16px; }
  summary { cursor: pointer; color: #8b949e; font-size: 12px; user-select: none; }
  summary:hover { color: #c9d1d9; }
  pre.log { background: #010409; border: 1px solid #30363d; border-radius: 6px;
    padding: 8px 10px; margin-top: 8px; font-size: 11px; line-height: 1.4;
    max-height: 200px; overflow: auto; color: #8b949e; white-space: pre-wrap; word-break: break-all; }
  .dot { animation: blink 1.4s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 20% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
</style>
</head>
<body>
  <div class="container">
    <div class="pi">π</div>
    <div class="status" id="status">Connecting to dashboard<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
    <div class="error" id="error">
      <h3>Cannot connect to dashboard server</h3>
      <p>The server at <code id="server-url">http://localhost:8000</code> is not responding.</p>
      <div class="diagnosis" id="diagnosis" style="display:none;"></div>
      <div class="actions">
        <button class="primary-btn" id="start-btn">Start server</button>
        <button class="secondary-btn" id="reinstall-btn" style="display:none;">Reinstall managed packages</button>
        <button class="link-btn" id="doctor-btn">Open Doctor</button>
      </div>
      <details class="advanced" id="advanced-panel" style="display:none;">
        <summary>Advanced recovery</summary>
        <div class="advanced-body">
          <button class="danger-btn" id="force-reinstall-btn">Force reinstall (wipe + reinstall)</button>
        </div>
      </details>
      <p style="color:#c9d1d9;">Or install and start the dashboard manually:</p>
      <p><code>npm install -g @blackbelt-technology/pi-dashboard</code></p>
      <p><code>pi-dashboard start</code></p>
      <details id="log-panel" style="display:none;">
        <summary>Server log (last 20 lines)</summary>
        <pre class="log" id="log-content"></pre>
      </details>
      <div id="known-servers" style="display:none; margin-top: 20px;"></div>
    </div>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const serverUrl = params.get("serverUrl") || "http://localhost:8000";
      document.getElementById("server-url").textContent = serverUrl;

      const statusEl = document.getElementById("status");
      const errorEl = document.getElementById("error");
      const startBtn = document.getElementById("start-btn");
      const doctorBtn = document.getElementById("doctor-btn");
      const reinstallBtn = document.getElementById("reinstall-btn");
      const forceReinstallBtn = document.getElementById("force-reinstall-btn");
      const advancedPanel = document.getElementById("advanced-panel");
      const diagnosisEl = document.getElementById("diagnosis");
      const logPanel = document.getElementById("log-panel");
      const logContent = document.getElementById("log-content");

      // Inventory state cached from api.checkManagedInventory().
      let cachedDiff = null;
      let installInflight = false;

      // Render known-servers list (passed via query as base64 JSON to avoid quoting issues).
      try {
        const ksRaw = params.get("knownServers");
        if (ksRaw) {
          const ks = JSON.parse(atob(ksRaw));
          if (Array.isArray(ks) && ks.length > 0) {
            const wrap = document.getElementById("known-servers");
            wrap.style.display = "block";
            const head = document.createElement("h3");
            head.style.cssText = "color:#c9d1d9; font-size:14px; margin:0 0 8px;";
            head.textContent = "Known Servers";
            wrap.appendChild(head);
            for (const s of ks) {
              const btn = document.createElement("button");
              btn.className = "server-btn";
              btn.innerHTML =
                '<span class="server-label"></span><span class="server-addr"></span>';
              btn.querySelector(".server-label").textContent = s.label || s.host;
              btn.querySelector(".server-addr").textContent = s.host + ":" + s.port;
              btn.addEventListener("click", () => {
                location.href = "http://" + s.host + ":" + s.port;
              });
              wrap.appendChild(btn);
            }
          }
        }
      } catch (_) { /* ignore malformed input */ }

      const api = window.piDashboard;
      const MAX_ATTEMPTS_BEFORE_ERROR = 10; // ~15 seconds
      let attempts = 0;
      let errorShown = false;

      function showError() {
        if (errorShown) return;
        errorShown = true;
        statusEl.style.display = "none";
        errorEl.style.display = "block";
        // Populate log panel.
        if (api && api.readServerLog) {
          api.readServerLog(20).then((tail) => {
            if (tail && tail.trim().length > 0) {
              logContent.textContent = tail;
              logPanel.style.display = "block";
            }
          }).catch(() => { /* ignore */ });
        }
        // Run inventory probe and surface recovery affordances.
        if (api && api.checkManagedInventory) {
          api.checkManagedInventory()
            .then((diff) => {
              cachedDiff = diff;
              applyDiagnosis(diff);
            })
            .catch((err) => {
              console.warn("[loading] inventory probe failed:", err);
            });
        }
      }

      /**
       * Apply diagnosis state to the UI.
       *  - Shows diagnosis text when `needsAction` is true.
       *  - Reveals Reinstall button when there are missing/stale entries.
       *  - Reveals Force reinstall under Advanced when corrupt entries OR
       *    a prior reinstall attempt failed.
       */
      function applyDiagnosis(diff, opts) {
        opts = opts || {};
        if (!diff || !diff.needsAction) {
          diagnosisEl.style.display = "none";
          reinstallBtn.style.display = "none";
          if (!opts.keepAdvanced) advancedPanel.style.display = "none";
          return;
        }
        const text = diff.diagnosis || formatFallbackDiagnosis(diff);
        diagnosisEl.textContent = text;
        diagnosisEl.style.display = "block";
        diagnosisEl.classList.toggle("error-tone", (diff.corrupt || []).length > 0 || !!opts.reinstallFailed);

        const hasFixable = (diff.missing || []).length > 0 || (diff.stale || []).length > 0;
        reinstallBtn.style.display = hasFixable && !installInflight ? "inline-block" : "none";

        const hasCorrupt = (diff.corrupt || []).length > 0;
        if (hasCorrupt || opts.reinstallFailed) {
          advancedPanel.style.display = "block";
          advancedPanel.open = true;
        }
      }

      /** Fallback diagnosis string when main process didn't provide one. */
      function formatFallbackDiagnosis(diff) {
        const parts = [];
        if (diff.missing && diff.missing.length > 0) {
          parts.push("Missing: " + diff.missing.join(", "));
        }
        if (diff.stale && diff.stale.length > 0) {
          parts.push("Outdated: " + diff.stale.join(", "));
        }
        if (diff.corrupt && diff.corrupt.length > 0) {
          parts.push("Corrupt: " + diff.corrupt.join(", "));
        }
        if (parts.length === 0) return "Managed packages need attention.";
        return parts.join(" \u2014 ") + ". Reinstall will repair from the bundled offline cache.";
      }

      async function tryConnect() {
        try {
          const res = await fetch(serverUrl + "/api/health", { signal: AbortSignal.timeout(2000) });
          if (res.ok) { location.href = serverUrl; return; }
        } catch (_) { /* not ready */ }
        attempts++;
        if (attempts === MAX_ATTEMPTS_BEFORE_ERROR) showError();
        setTimeout(tryConnect, 1500);
      }
      setTimeout(tryConnect, 1000);

      function setBusy(busy, msg) {
        startBtn.disabled = busy;
        startBtn.textContent = busy ? (msg || "Launching\u2026") : "Start server";
      }

      function setReinstallBusy(busy, label) {
        installInflight = busy;
        reinstallBtn.disabled = busy;
        reinstallBtn.textContent = busy ? (label || "Reinstalling\u2026") : "Reinstall managed packages";
        forceReinstallBtn.disabled = busy;
        // Hide Reinstall during a force-reinstall (different button drove the work).
        if (busy && label && label.indexOf("Force") >= 0) {
          reinstallBtn.style.display = "none";
        }
      }

      /** Resume the connection polling after a successful reinstall. */
      function resumePolling() {
        errorShown = false;
        errorEl.style.display = "none";
        statusEl.style.display = "block";
        statusEl.textContent = "Reconnecting to dashboard\u2026";
        attempts = 0;
        setTimeout(tryConnect, 500);
      }

      if (api && api.reinstallManaged) {
        reinstallBtn.addEventListener("click", async () => {
          setReinstallBusy(true, "Reinstalling\u2026");
          try {
            const outcome = await api.reinstallManaged();
            if (outcome.kind === "ok") {
              setReinstallBusy(false);
              // Try to launch (server may have been down because packages were missing).
              if (api.requestLaunch) {
                api.requestLaunch(false).then((r) => {
                  if (r && (r.kind === "started" || r.kind === "already-running")) {
                    statusEl.style.display = "block";
                    statusEl.textContent = "Reinstall complete \u2014 connecting\u2026";
                    setTimeout(() => { location.href = r.url || serverUrl; }, 300);
                  } else {
                    resumePolling();
                  }
                }).catch(() => resumePolling());
              } else {
                resumePolling();
              }
            } else {
              setReinstallBusy(false);
              applyDiagnosis(cachedDiff, { reinstallFailed: true, keepAdvanced: true });
              diagnosisEl.textContent = "Reinstall failed: " + (outcome.reason || "unknown error") +
                ". Try Force reinstall under Advanced.";
              diagnosisEl.classList.add("error-tone");
            }
          } catch (err) {
            setReinstallBusy(false);
            applyDiagnosis(cachedDiff, { reinstallFailed: true, keepAdvanced: true });
            diagnosisEl.textContent = "Reinstall error: " + (err && err.message ? err.message : String(err));
            diagnosisEl.classList.add("error-tone");
          }
        });
      } else {
        reinstallBtn.style.display = "none";
      }

      if (api && api.forceReinstall) {
        forceReinstallBtn.addEventListener("click", async () => {
          setReinstallBusy(true, "Force reinstalling\u2026");
          try {
            const outcome = await api.forceReinstall();
            if (outcome.kind === "ok") {
              setReinstallBusy(false);
              if (api.requestLaunch) {
                api.requestLaunch(false).then((r) => {
                  if (r && (r.kind === "started" || r.kind === "already-running")) {
                    statusEl.style.display = "block";
                    statusEl.textContent = "Force reinstall complete \u2014 connecting\u2026";
                    setTimeout(() => { location.href = r.url || serverUrl; }, 300);
                  } else {
                    resumePolling();
                  }
                }).catch(() => resumePolling());
              } else {
                resumePolling();
              }
            } else if (outcome.kind === "cancelled") {
              setReinstallBusy(false);
              // User cancelled in confirmation dialog \u2014 no UI change beyond busy reset.
            } else {
              setReinstallBusy(false);
              diagnosisEl.style.display = "block";
              diagnosisEl.textContent = "Force reinstall failed: " + (outcome.reason || "unknown error");
              diagnosisEl.classList.add("error-tone");
            }
          } catch (err) {
            setReinstallBusy(false);
            diagnosisEl.style.display = "block";
            diagnosisEl.textContent = "Force reinstall error: " + (err && err.message ? err.message : String(err));
            diagnosisEl.classList.add("error-tone");
          }
        });
      } else {
        forceReinstallBtn.style.display = "none";
      }

      // Stream install progress into the status line during reinstall.
      if (api && api.onInstallProgress) {
        api.onInstallProgress((p) => {
          if (!installInflight) return;
          if (p.status === "running") {
            const out = p.output ? " \u2014 " + p.output : "";
            reinstallBtn.textContent = "Reinstalling " + p.step + out;
          } else if (p.status === "error") {
            reinstallBtn.textContent = "Error: " + (p.error || p.step);
          }
        });
      }

      if (api && api.requestLaunch) {
        startBtn.addEventListener("click", async () => {
          setBusy(true);
          try {
            const outcome = await api.requestLaunch(false);
            if (outcome.kind === "started" || outcome.kind === "already-running") {
              statusEl.style.display = "block";
              statusEl.textContent = "Server started \u2014 reloading\u2026";
              setTimeout(() => { location.href = outcome.url; }, 300);
              return;
            }
            // failed
            setBusy(false);
            statusEl.style.display = "block";
            statusEl.textContent = "Launch failed: " + outcome.reason;
            if (outcome.logTail) {
              logContent.textContent = outcome.logTail;
              logPanel.style.display = "block";
              logPanel.open = true;
            }
          } catch (err) {
            setBusy(false);
            statusEl.style.display = "block";
            statusEl.textContent = "Launch error: " + (err && err.message ? err.message : err);
          }
        });
      } else {
        // Preload not attached \u2014 hide the action so we don't lie to the user.
        startBtn.style.display = "none";
      }

      if (api && api.openDoctor) {
        doctorBtn.addEventListener("click", () => api.openDoctor());
      } else {
        doctorBtn.style.display = "none";
      }

      if (api && api.onStatus) {
        api.onStatus((status) => {
          if (!status) return;
          if (status.phase === "spawning") setBusy(true, "Spawning server\u2026");
          else if (status.phase === "waiting-health") setBusy(true, "Waiting for health\u2026");
          else if (status.phase === "shutting-down-existing") setBusy(true, "Stopping existing\u2026");
          else if (status.phase === "ready") setBusy(false);
          else if (status.phase === "failed") setBusy(false);
        });
      }
    })();
  </script>
</body>
</html>

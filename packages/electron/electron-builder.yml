# electron-builder config for macOS (DMG) and Linux (AppImage).
#
# Why this exists: @electron-forge/maker-* does NOT emit the `latest*.yml`
# update-metadata + `app-update.yml` that electron-updater requires. This
# config drives electron-builder in `--prepackaged` mode (the same pattern the
# Windows NSIS build already uses, see electron-builder-nsis.json) so the DMG /
# AppImage AND their metadata are produced from the Forge-packaged app.
# See change: fix-electron-auto-update-pipeline (D1).
#
# Windows is configured separately in electron-builder-nsis.json (kept distinct
# to preserve the proven NSIS build). All three configs MUST agree on appId /
# productName / executableName — enforced by build-config-parity.test.ts.
#
# Signing: macOS signing + notarisation happen during `electron-forge package`
# (forge.config.ts osxSign/osxNotarize, gated on APPLE_IDENTITY). This config
# does NOT re-sign — CI sets CSC_IDENTITY_AUTO_DISCOVERY=false so electron-builder
# wraps the already-signed .app without stripping its Developer-ID signature.

appId: com.blackbelt-technology.pi-dashboard
productName: PI Dashboard
executableName: pi-dashboard

directories:
  output: out/make
  buildResources: build

# electron-updater reads provider/owner/repo from the app-update.yml that
# electron-builder writes into the packaged app from this block.
publish:
  provider: github
  owner: BlackBeltTechnology
  repo: pi-agent-dashboard

# Do not rebuild native modules — the app is already packaged + signed by Forge.
npmRebuild: false

mac:
  target: dmg
  icon: resources/icon.icns
  # Arch-tagged so the arm64 + x64 matrix legs land distinct release assets
  # (replaces the JS-composed basename workaround from
  # fix-darwin-dmg-arch-collision — electron-builder supports ${arch} natively).
  artifactName: PI-Dashboard-${version}-${arch}.${ext}

linux:
  target: AppImage
  icon: resources/icon.png
  artifactName: PI-Dashboard-${version}-${arch}.${ext}
